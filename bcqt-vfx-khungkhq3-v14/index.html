// filter tháng UI
function renderFilter(){
  let h='';
  MONTHS.slice().reverse().forEach(m=>{
    h+=`<button class="mbtn ${showM.includes(m)?'on':''}" onclick="toggleM(${m})">T${m}</button>`;
  });
  document.getElementById('mfilter').innerHTML=h;
}
function toggleM(m){
  if(showM.includes(m)) showM=showM.filter(x=>x!==m);
  else showM=[...showM,m].sort((a,b)=>b-a);
  if(!showM.length) showM=[m];
  renderFilter(); renderAll();
}
// header tháng (5..1, kỳ gần nhất trái) + 3 cột tổng kết vùng chọn
function thMonths(){
  let h='<th>Khoản mục</th>';
  showM.forEach(m=>{h+=`<th class="mh">T${m}/26</th><th>%</th>`;});
  const lbl=showM.length>1?`Σ ${showM.length}T`:'Σ';
  h+=`<th class="sumh">${lbl}</th><th class="sumh">TB/th</th><th>%TB</th>`;
  return '<thead><tr>'+h+'</tr></thead>';
}
// 1 dòng: nhãn + (giá trị, %) cho từng tháng hiện + (Σ, TB, %TB) vùng chọn
function row(label,valArr,denArr,cls){
  let h=`<tr class="${cls||''}"><td>${label}</td>`;
  let sumV=0,sumD=0;
  showM.forEach(m=>{
    const i=m-1; const v=valArr[i]; const d=denArr?denArr[i]:0;
    h+=`<td class="mv ${v<0?'neg':''}">${fmt(v)}</td><td class="mpc">${pctv(v,d)}</td>`;
    sumV+=v; if(denArr)sumD+=d;
  });
  const n=showM.length, avgV=sumV/n;
  h+=`<td class="sumv ${sumV<0?'neg':''}">${fmt(sumV)}</td>`;
  h+=`<td class="sumv ${avgV<0?'neg':''}">${fmt(avgV)}</td>`;
  h+=`<td class="mpc">${denArr?pctv(sumV,sumD):''}</td>`;
  return h+'</tr>';
}
// dòng phân nhóm (sub-header in nghiêng) span hết bảng
function rowGrp(label){
  const span=1+showM.length*2+3;
  return `<tr class="subgrp"><td colspan="${span}">${label}</td></tr>`;
}

const SR_TAB_ORDER=['Q9','SL','LA','QT','BL'];  // HO loại khỏi tầng showroom (khác cấu trúc)
let selSR=['Q9','SL','LA','QT','BL'];           // mặc định chọn hết → conso toàn mạng
function toggleSRfix(s){
  if(selSR.includes(s)){ if(selSR.length>1) selSR=selSR.filter(x=>x!==s); }
  else selSR=SR_TAB_ORDER.filter(x=>selSR.includes(x)||x===s);
  renderSRtab();
}
function selAllSR(on){ selSR = on ? SR_TAB_ORDER.slice() : [SR_TAB_ORDER[0]]; renderSRtab(); }
// conso: cộng group g qua các SR được chọn → object {key:[T1..T5]}
function consoG(){
  const keys=new Set();
  selSR.forEach(s=>{ if(SR[s]) Object.keys(SR[s].g).forEach(k=>keys.add(k)); });
  const out={};
  keys.forEach(k=>{ out[k]=[0,0,0,0,0];
    selSR.forEach(s=>{ if(SR[s]&&SR[s].g[k]) for(let i=0;i<5;i++) out[k][i]+=SR[s].g[k][i]; });
  });
  return out;
}
function renderSRtab(){

  // ===== VIEW 2: SO SÁNH NGANG CÁC SHOWROOM (conso các tháng đã chọn) =====

  // helper render 1 dòng so ngang: nhãn + giá trị mỗi SR + tổng; pctOf = mẫu số để hiện % (theo từng cột rev)

  h+=hrow('+ Back margin','back',{cls:'sub',pct:'rev'});

}

function renderCMtab(){

  <div class="tscroll"><table><thead><tr><th>Showroom</th><th class="mh">DThu xe (Σ)</th><th>CKCB %</th><th>CTKM %</th><th>Hoa hồng/KPI %</th><th>PK/BH/cũ %</th><th>Front %</th><th>Back %</th><th>CM xe %</th></tr></thead><tbody>`;

    const front=ckcb+ctkm+comm+phu;
    const back=sumM(gg,'back');

     <td class="neg">${(comm/rev*100).toFixed(2)}%</td>
     <td class="pos">${(phu/rev*100).toFixed(2)}%</td>
     <td class="gold">${(front/rev*100).toFixed(2)}%</td>
     <td class="pos">${(back/rev*100).toFixed(2)}%</td>
     <td class="gold" style="font-weight:600">${(cm/rev*100).toFixed(2)}%</td></tr>`;
  });
  // GRAND TOTAL — cộng tất cả showroom, % tính trên Σ tuyệt đối (để đối chiếu tầng công ty)

  h+=`<tr class="tot"><td>TỔNG SHOWROOM (đối chiếu cty)</td><td class="mv">${fmt(TrevX)}</td>
     <td>${(Tckcb/R*100).toFixed(2)}%</td>
     <td>${(Tctkm/R*100).toFixed(2)}%</td>
     <td>${(Tcomm/R*100).toFixed(2)}%</td>
     <td>${(Tphu/R*100).toFixed(2)}%</td>
     <td>${(Tfront/R*100).toFixed(2)}%</td>
     <td>${(Tback/R*100).toFixed(2)}%</td>
     <td style="font-weight:700">${(Tcm/R*100).toFixed(2)}%</td></tr>`;
  h+=`</tbody></table></div>`;

  // Back margin xu hướng 5 tháng theo SR
  h+=`<h2 class="sec"><span class="n">▸</span> Back margin tuyệt đối theo tháng (triệu) · đòn bẩy CM lớn nhất</h2>
  <div class="secnote">Back = toàn bộ thu nhập từ hãng. T3 cao vì <b>thưởng quý 1 hạch toán dồn vào tháng cuối quý</b> — chọn cả quý (T3-T5) ở filter để nhìn back bình quân, đúng bản chất kinh tế. Bảng ma trận bên dưới bóc back theo từng chương trình.</div>
  <div class="tscroll"><table>${thMonthsSimple()}<tbody>`;
  const Tback5=[0,0,0,0,0];

    h+=rowSimple(NM[s],back,'pos');
  });
  h+=rowSimpleTot('TỔNG SHOWROOM',Tback5);

  const PROG=B.backPrograms||{};

  const sumProg=(sr_obj,sr)=>{const a=sr_obj[sr]||[0,0,0,0,0];return showM.reduce((x,m)=>x+(a[m-1]||0),0);};
  // sắp chương trình theo tổng giảm dần
  const progNames=Object.keys(PROG).sort((a,b)=>{
    const ta=psrOrder.reduce((x,s)=>x+sumProg(PROG[b],s),0), tb=psrOrder.reduce((x,s)=>x+sumProg(PROG[a],s),0);

  progNames.forEach(p=>{

    h+=`<tr><td>${p}</td>`;
    psrOrder.forEach(s=>{const v=sumProg(PROG[p],s); colTot[s]+=v; rowTot+=v;
      h+=`<td class="mv ${v>0?'pos':''}">${v>0?fmt(v):'—'}</td>`;});
    h+=`<td class="sumv">${fmt(rowTot)}</td><td class="mpc">${grand?(rowTot/grand*100).toFixed(1)+'%':''}</td></tr>`;
  });
  // dòng tổng cột
  h+=`<tr class="tot"><td>TỔNG BACK</td>`;
  let gt=0;
  psrOrder.forEach(s=>{h+=`<td class="mv">${fmt(colTot[s])}</td>`; gt+=colTot[s];});
  h+=`<td class="sumv">${fmt(gt)}</td><td class="mpc">100%</td></tr>`;
  h+=`</tbody></table></div>
  <div class="note"><b>Cách đọc:</b> "Kích thích bán lẻ" & "Hỗ trợ mở mới" là hai chương trình lớn nhất — Sa La (hub mới) ăn đậm hỗ trợ mở mới, đúng bản chất. "Thưởng nhập sỉ" & "Hoàn thành chỉ tiêu" gắn với sản lượng nên Q9 dẫn đầu. Khi mở thêm hub, phần "hỗ trợ mở mới" sẽ tăng tạm thời rồi hết — đây là back <b>không bền</b>, khác với thưởng sản lượng. Phân biệt được giúp dự báo back chính xác hơn trong mô hình KH.</div>`;
  document.getElementById('cm').innerHTML=h;
}

     <td class="neg">${fmt(fix)}</td><td class="${ln>=0?'pos':'neg'}">${fmtS(ln)}</td></tr>`;
  });
  h+=`<tr class="tot"><td>TỔNG XƯỞNG</td><td class="mv">${fmt(tR)}</td><td>${fmt(tR-tCM)}</td><td>${fmt(tCM)}</td><td class="mpc">${pctv(tCM,tR)}</td><td>${fmt(tF)}</td><td class="${(tCM+tF)>=0?'pos':'neg'}">${fmtS(tCM+tF)}</td></tr></tbody></table></div>`;

  // xu hướng CM% xưởng 5 tháng
  h+=`<h2 class="sec"><span class="n">▸</span> %CM xưởng theo tháng</h2><div class="tscroll"><table>${thMonthsSimple()}<tbody>`;
  const TrevM=[0,0,0,0,0], TcmM=[0,0,0,0,0]; let TsRev=0,TsCM=0;
  order.forEach(s=>{
    if(!SR[s])return; const gg=SR[s].g; if(!g(gg,'rev_dv').some(x=>Math.abs(x)>1))return;
    h+=`<tr><td>${NM[s]}</td>`;
    let sRev=0,sCM=0;
    showM.forEach(m=>{const i=m-1;const rev=g(gg,'rev_dv')[i];const cm=rev+g(gg,'cogs_dv')[i]+g(gg,'back_dv')[i];
      sRev+=rev;sCM+=cm; TrevM[i]+=rev;TcmM[i]+=cm;
      h+=`<td class="mv gold">${rev?(cm/rev*100).toFixed(1)+'%':'—'}</td>`;});
    TsRev+=sRev;TsCM+=sCM;
    h+=`<td class="sumv gold" colspan="2">${sRev?(sCM/sRev*100).toFixed(1)+'%':'—'}</td>`;
    h+='</tr>';
  });
  // GRAND TOTAL: %CM xưởng toàn mạng mỗi tháng = Σcm/Σrev
  h+=`<tr class="tot"><td>TỔNG XƯỞNG</td>`;
  showM.forEach(m=>{const i=m-1;h+=`<td class="mv">${TrevM[i]?(TcmM[i]/TrevM[i]*100).toFixed(1)+'%':'—'}</td>`;});
  h+=`<td class="sumv" colspan="2">${TsRev?(TsCM/TsRev*100).toFixed(1)+'%':'—'}</td></tr>`;
  h+=`</tbody></table></div>
  <div class="note"><b>Fixed XDV giờ là số thực:</b> nhờ BKCT, chi phí xưởng (SE300) tách đúng theo từng SR — không còn ước tỉ lệ như bản trước. LN xưởng là số reconcile với sổ. LA thường lỗ DV (CM mỏng không gánh nổi fixed) — khớp nhận định LA yếu cả hai khối.</div>`;
  document.getElementById('xdv').innerHTML=h;
}
