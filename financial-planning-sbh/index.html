function ensureScopes(){
  if(!Array.isArray(STATE.selectedScopes)||!STATE.selectedScopes.length)STATE.selectedScopes=['BU12','BU3','CSS'];
  const valid=new Set(scopeOptions().map(o=>o.key));
  STATE.selectedScopes=STATE.selectedScopes.filter(k=>valid.has(k));
  if(!STATE.selectedScopes.length)STATE.selectedScopes=['BU12','BU3','CSS'];
}
function toggleScope(key,checked){
  ensureScopes();
  let set=new Set(STATE.selectedScopes);
  if(checked){
    if(key==='BU12'){
      ['BU12|SBH - Own channel','BU12|SBH - Partnership','BU12|HLB'].forEach(k=>set.delete(k));
      set.add('BU12');
    } else if(key.startsWith('BU12|')){
      set.delete('BU12'); set.add(key);
    } else set.add(key);
  } else {
    set.delete(key);
  }
  STATE.selectedScopes=[...set];
  if(!STATE.selectedScopes.length)STATE.selectedScopes=['BU12','BU3','CSS'];
  scheduleSave(); render();
}
function setScopePreset(preset){
  if(preset==='all')STATE.selectedScopes=['BU12','BU3','CSS'];
  else if(preset==='business')STATE.selectedScopes=['BU12','BU3'];
  else if(preset==='bu12seg')STATE.selectedScopes=['BU12|SBH - Own channel','BU12|SBH - Partnership','BU12|HLB'];
  else if(preset==='corp')STATE.selectedScopes=['CSS'];
  else if(preset==='clear')STATE.selectedScopes=[];
  if(!STATE.selectedScopes.length)STATE.selectedScopes=['BU12','BU3','CSS'];
  scheduleSave(); render();
}
function renderScopeControls(){
  ensureScopes();
  const selected=new Set(STATE.selectedScopes);
  const chips=scopeOptions().map(o=>`<label class="scope-chip ${o.type}"><input type="checkbox" ${selected.has(o.key)?'checked':''} onchange="toggleScope('${o.key.replace(/'/g,"\\'")}',this.checked)"> ${o.type==='child'?'↳ ':''}${o.label}</label>`).join('');
  return `<span class="scope-title">Forecast scope</span>${chips}<span class="scope-actions"><button class="btn" onclick="setScopePreset('all')">All company</button><button class="btn" onclick="setScopePreset('business')">Business BU only</button><button class="btn" onclick="setScopePreset('bu12seg')">BU12 by segment</button><button class="btn" onclick="setScopePreset('corp')">Corporate only</button></span><div class="scope-note">Forecast P&L hiển thị từng selected scope riêng. Consolidated Forecast P&L cộng gộp các selected scope thành một bảng. Parent/child BU12 được chống double-count bằng cách tự loại trừ nhau.</div>`;
}
function selectedScopeSummary(){ensureScopes(); return STATE.selectedScopes.map(scopeLabel).join(' + ');}

function neg(v){return v>0?-v:v}
function pos(v){return v<0?-v:v}
function arr(n=0){return FORECAST_MONTHS.map(()=>n)}
function defaultManual(key,l2){const a=actualLine(key,l2);return arr(a||0)}
function kstore(key){if(!STATE.drivers[key]) STATE.drivers[key]={}; return STATE.drivers[key];}
function initDrivers(){STATE.drivers={}; allSourceKeys().forEach(key=>{const D=kstore(key); if(key==='BU12|SBH - Own channel')initOwn(D,key); else if(key==='BU12|SBH - Partnership')initPartnership(D,key); else if(key==='BU12|HLB')initHLB(D,key); else if(key==='BU3')initBU3(D,key); else initCSS(D,key);});}
function initOwn(D,key){D.newUsers=arr(100);D.arpuNew=arr(1.2);D.renewedUsers=arr(900);D.arpuRenewed=arr(1.0);D.hardwarePct=3;D.servicePct=2;D.acctCustomers=arr(20);D.acctFee=1;D.cogsSoftware=defaultManual(key,'3.1 COGS_Software');D.cogsHardwarePct=95;D.cogsAcctPct=75;D.commissionPct=15;D.cac=arr(0.35); flattenCOAFor(key).forEach(c=>{if(!D[c.l2])D[c.l2]=defaultManual(key,c.l2);});}
function initPartnership(D,key){D.accounts=[]; for(let i=0;i<10;i++){D.accounts.push({name:i<5?['HDBank','VNPT','NCB','Shinhan','Viettel'][i]:'Partner mới '+(i-4),type:'SAAS',newUsers:arr(i<3?50:0),arpu:arr(1.0)});}D.serviceMode='pct';D.servicePct=0;D.serviceManual=arr(actualLine(key,'1.3 Revenue_Service')||0);D.cogsSoftware=defaultManual(key,'3.1 COGS_Software');D.inhouseRate=5;D.partnerRate=25; flattenCOAFor(key).forEach(c=>{if(!D[c.l2])D[c.l2]=defaultManual(key,c.l2);});}
function initHLB(D,key){D.l8=arr(500);D.conv=arr(10);D.commissionH5=0.05;D.promotionPerH5=0;D.incrementalDiscount=arr(0);D.referralH5=arr(50);D.referralBonus=0.05;D.affiliateH5=arr(50);D.affiliateCommission=0.05; flattenCOAFor(key).forEach(c=>{if(!D[c.l2])D[c.l2]=defaultManual(key,c.l2);});}
function initBU3(D,key){D.newUsers=arr(20);D.arpuNew=arr(0.8);D.renewedUsers=arr(50);D.arpuRenewed=arr(0.8);D.cogsSoftware=defaultManual(key,'3.1 COGS_Software');D.commissionPct=5;D.cac=arr(0.3); flattenCOAFor(key).forEach(c=>{if(!D[c.l2])D[c.l2]=defaultManual(key,c.l2);});}
function initCSS(D,key){flattenCOAFor(key).forEach(c=>{D[c.l2]=defaultManual(key,c.l2);});}
function totalRev(vals){return vals['1.1 Revenue_Software'].map((_,i)=>Object.keys(vals).filter(k=>gcode(k)===1).reduce((a,k)=>a+vals[k][i],0));}
function computeOwn(){const D=kstore('BU12|SBH - Own channel'),V={}; V['1.1 Revenue_Software']=FORECAST_MONTHS.map((_,i)=>D.newUsers[i]*D.arpuNew[i]+D.renewedUsers[i]*D.arpuRenewed[i]);V['1.2 Revenue_Hardware']=V['1.1 Revenue_Software'].map(v=>v*D.hardwarePct/100);V['1.3 Revenue_Service']=V['1.1 Revenue_Software'].map(v=>v*D.servicePct/100);V['1.4 Revenue_Accounting Svc']=FORECAST_MONTHS.map((_,i)=>D.acctCustomers[i]*D.acctFee);V['2.1 Sale discount']=arr(0);V['2.2 Sale promotion']=arr(0);V['3.1 COGS_Software']=(D.cogsSoftware||defaultManual('BU12|SBH - Own channel','3.1 COGS_Software')).map(x=>x>0?-x:x);V['3.2 COGS_Hardware']=V['1.2 Revenue_Hardware'].map(v=>-v*D.cogsHardwarePct/100);V['3.4 COGS_Accounting Svc']=V['1.4 Revenue_Accounting Svc'].map(v=>-v*D.cogsAcctPct/100);V['4.2 In-house commission']=totalRev(V).map(v=>-v*D.commissionPct/100);V['5.3 Performance Marketing']=FORECAST_MONTHS.map((_,i)=>-D.newUsers[i]*D.cac[i]); flattenCOAFor('BU12|SBH - Own channel').forEach(c=>{if(!V[c.l2])V[c.l2]=(D[c.l2]||arr()).map(x=>x>0&&gcode(c.l2)>1?-x:x);}); return V;}
function computePartnership(){const D=kstore('BU12|SBH - Partnership'),V={}; V['1.1 Revenue_Software']=FORECAST_MONTHS.map((_,i)=>D.accounts.reduce((a,ka)=>ka.type==='Tech service'?a:a+(Number(ka.newUsers[i])||0)*(Number(ka.arpu[i])||0),0));V['1.3 Revenue_Service']=FORECAST_MONTHS.map((_,i)=>D.accounts.reduce((a,ka)=>ka.type==='Tech service'?a+(Number(ka.newUsers[i])||0)*(Number(ka.arpu[i])||0):a,0));V['2.1 Sale discount']=arr(0);V['3.1 COGS_Software']=D.cogsSoftware.map(x=>x>0?-x:x);const base=FORECAST_MONTHS.map((_,i)=>V['1.1 Revenue_Software'][i]+V['1.3 Revenue_Service'][i]);V['4.2 In-house commission']=base.map(v=>-v*D.inhouseRate/100);V['4.3 Partner commission']=base.map(v=>-v*D.partnerRate/100); flattenCOAFor('BU12|SBH - Partnership').forEach(c=>{if(!V[c.l2])V[c.l2]=(D[c.l2]||arr()).map(x=>x>0&&gcode(c.l2)>1?-x:x);}); return V;}
function computeHLB(){const D=kstore('BU12|HLB'),V={};const h5Organic=FORECAST_MONTHS.map((_,i)=>Number(D.l8[i]||0)*Number(D.conv[i]||0)/100);const organicCommission=h5Organic.map(v=>-v*Number(D.commissionH5||0));const promoPerH5=Number(D.promotionPerH5 ?? 0);V['2.1 Sale discount']=h5Organic.map(v=>-v*promoPerH5);V['4.2 In-house commission']=FORECAST_MONTHS.map((_,i)=>organicCommission[i]-(Number(D.referralH5[i]||0)*Number(D.referralBonus||0)));V['5.5 Partnership Marketing']=FORECAST_MONTHS.map((_,i)=>-(Number(D.affiliateH5[i]||0)*Number(D.affiliateCommission||0))); flattenCOAFor('BU12|HLB').forEach(c=>{if(!V[c.l2])V[c.l2]=(D[c.l2]||arr()).map(x=>x>0&&gcode(c.l2)>1?-x:x);}); return V;}
function hlbMetrics(){const D=kstore('BU12|HLB');const h5Org=FORECAST_MONTHS.map((_,i)=>D.l8[i]*D.conv[i]/100);const totalH5=FORECAST_MONTHS.map((_,i)=>h5Org[i]+D.referralH5[i]+D.affiliateH5[i]);const V=computeHLB();const cost=FORECAST_MONTHS.map((_,i)=>Object.keys(V).filter(k=>gcode(k)>1).reduce((a,k)=>a+V[k][i],0));const cph=FORECAST_MONTHS.map((_,i)=>totalH5[i]?Math.abs(cost[i])/totalH5[i]:0);return {h5Org,totalH5,cost,cph};}
function computeBU3(){const D=kstore('BU3'),V={};V['1.1 Revenue_Software']=FORECAST_MONTHS.map((_,i)=>D.newUsers[i]*D.arpuNew[i]+D.renewedUsers[i]*D.arpuRenewed[i]);V['2.1 Sale discount']=arr(0);V['2.2 Sale promotion']=arr(0);V['3.1 COGS_Software']=(D.cogsSoftware||defaultManual('BU12|SBH - Own channel','3.1 COGS_Software')).map(x=>x>0?-x:x);V['4.2 In-house commission']=V['1.1 Revenue_Software'].map(v=>-v*D.commissionPct/100);V['5.3 Performance Marketing']=FORECAST_MONTHS.map((_,i)=>-D.newUsers[i]*D.cac[i]); flattenCOAFor('BU3').forEach(c=>{if(!V[c.l2])V[c.l2]=(D[c.l2]||arr()).map(x=>x>0&&gcode(c.l2)>1?-x:x);});return V;}
function computeCSS(){const D=kstore('CSS'),V={}; flattenCOAFor('CSS').forEach(c=>{V[c.l2]=(D[c.l2]||arr()).map(x=>x>0&&gcode(c.l2)>1?-x:x);});return V;}
function calcValues(key){if(key==='BU12|SBH - Own channel')return computeOwn(); if(key==='BU12|SBH - Partnership')return computePartnership(); if(key==='BU12|HLB')return computeHLB(); if(key==='BU3')return computeBU3(); return computeCSS();}
function forecastRows(key){const V=calcValues(key);return flattenCOAFor(key).map(c=>({l1:c.l1,l2:c.l2,beh:c.beh,gcode:gcode(c.l2),vals:V[c.l2]||arr()}));}
function plBlocks(rows){const byG=g=>rows.filter(r=>r.gcode===g);const sumRows=rs=>FORECAST_MONTHS.map((_,i)=>rs.reduce((a,r)=>a+r.vals[i],0));const rev=byG(1),disc=byG(2),cogs=byG(3),sell=byG(4),mkt=byG(5),staff6=byG(6),opex7=byG(7);const totRev=sumRows(rev),totDisc=sumRows(disc),netRev=FORECAST_MONTHS.map((_,i)=>totRev[i]+totDisc[i]);const cm=FORECAST_MONTHS.map((_,i)=>netRev[i]+sumRows(cogs)[i]+sumRows(sell)[i]+sumRows(mkt)[i]);const op=FORECAST_MONTHS.map((_,i)=>cm[i]+sumRows(staff6)[i]+sumRows(opex7)[i]);return {rev,disc,cogs,sell,mkt,staff6,opex7,totRev,totDisc,netRev,cm,op,sumRows};}
function methodFor(key,l2){if(key==='BU12|SBH - Own channel'){if(l2==='1.1 Revenue_Software')return 'New/Renewed users × ARPU';if(l2==='1.2 Revenue_Hardware')return '% Software revenue';if(l2==='1.3 Revenue_Service')return '% Software revenue';if(l2==='1.4 Revenue_Accounting Svc')return 'Customers × fee';if(gcode(l2)===2)return 'Fixed at 0 — net sale';if(l2==='5.3 Performance Marketing')return 'CAC × New users';if(l2==='4.2 In-house commission')return '% Total revenue';if(l2==='3.1 COGS_Software')return 'Direct cloud input';if(gcode(l2)===3)return '% Revenue';return 'Direct monthly input';}if(key==='BU12|SBH - Partnership'){if(l2==='1.1 Revenue_Software'||l2==='1.3 Revenue_Service')return '10 key accounts by service type';if(gcode(l2)===2)return 'Fixed at 0 — net price';if(l2==='3.1 COGS_Software')return 'Direct input (approx 5%)';if(l2==='4.2 In-house commission'||l2==='4.3 Partner commission')return '% Total partnership revenue';return 'Direct monthly input';}if(key==='BU12|HLB'){if(['2.1 Sale discount','4.2 In-house commission','5.5 Partnership Marketing'].includes(l2))return 'HLB funnel mapping';return 'Direct project support input';}if(key==='BU3'){if(l2==='1.1 Revenue_Software')return 'New/Renewed users × ARPU';if(gcode(l2)===2)return 'Fixed at 0 — net sale';if(l2==='3.1 COGS_Software')return 'Direct cloud input';if(l2==='4.2 In-house commission')return '% Revenue';if(l2==='5.3 Performance Marketing')return 'CAC × New users';return 'Direct monthly input';}return 'Direct monthly input';}
function formulaFor(key,l2){const m=methodFor(key,l2);const notes={ 'New/Renewed users × ARPU':'New users × ARPU new + Renewed users × ARPU renewed','% Software revenue':'% × Revenue_Software','Customers × fee':'Accounting service customers × Accounting service fee','Fixed at 0 — net sale':'Forecast uses net selling price, therefore discount/promotion is fixed at 0.','Fixed at 0 — net price':'Partnership revenue is planned at net selling price; discount is embedded in ARPU/net price.','CAC × New users':'New users × CAC × (-1)','% Total revenue':'Total Revenue × rate × (-1)','% Revenue':'Revenue base × rate × (-1)','Direct cloud input':'Cloud/infra cost = direct monthly input × (-1)','10 key accounts by service type':'Sum 10 key accounts: New users/volume × Net ARPU/net price; SAAS → 1.1, Tech service → 1.3','10 key accounts':'Sum across 10 key accounts: New users × Net ARPU','% or manual service revenue':'Revenue_Service = % × Revenue_Software, or manual monthly input','Direct input (approx 5%)':'Direct monthly COGS input; note: usually around 5% SaaS revenue','% Total partnership revenue':'Total Partnership Revenue × rate × (-1)','HLB funnel mapping':'HLB funnel drivers map cost into this P&L line. Incremental SBH discount = H5 converted × Promotion per H5.','Direct project support input':'Direct monthly input for fixed HLB project support','Direct monthly input':'Manual monthly amount × sign'};return notes[m]||m;}
function inputMonthRow(key,path,label,arrVals,decimals=1,step='0.1'){return `<label>${label}</label><div class="month-inputs">`+FORECAST_MONTHS.map((m,i)=>`<div><div class="mini-month">${MLBL[m]}</div><input class="num" type="number" step="${step}" value="${Number(arrVals[i]||0).toFixed(decimals)}" data-key="${key}" data-path="${path}" data-i="${i}"></div>`).join('')+`</div>`}

return `<div class="input-grid">${inputMonthRow(key,l2,'Direct monthly input',D[l2]||arr())}</div>`;}
function partnerRevenueOutput(D){const software=FORECAST_MONTHS.map((_,i)=>D.accounts.reduce((a,ka)=>ka.type==='Tech service'?a:a+(Number(ka.newUsers[i])||0)*(Number(ka.arpu[i])||0),0));const service=FORECAST_MONTHS.map((_,i)=>D.accounts.reduce((a,ka)=>ka.type==='Tech service'?a+(Number(ka.newUsers[i])||0)*(Number(ka.arpu[i])||0):a,0));const row=(label,vals)=>`<div class="rrow"><span>${label}</span>${vals.map(v=>`<span class="${cls(v)}">${fmt(v)}</span>`).join('')}<span class="${cls(sum(vals))}">${fmt(sum(vals))}</span></div>`;return `<div class="rev-output"><div class="rrow rhead"><span>Revenue output</span>${FORECAST_MONTHS.map(m=>`<span>${MLBL[m]}</span>`).join('')}<span>Total</span></div>${row('1.1 Revenue_Software',software)}${row('1.3 Revenue_Service',service)}</div>`;}

function parseCSV(text){
  const rows=[]; let row=[], cell='', inQuotes=false;
  text = String(text||'').replace(/^\uFEFF/,'');
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(inQuotes){
      if(ch==='"' && nx==='"'){cell+='"'; i++;}
      else if(ch==='"'){inQuotes=false;}
      else cell+=ch;
    }else{
      if(ch==='"') inQuotes=true;
      else if(ch===','){row.push(cell); cell='';}
      else if(ch==='\n'){
        row.push(cell); cell='';
        if(row.some(v=>String(v).trim()!=='')) rows.push(row);
        row=[];
      }else if(ch==='\r'){
        // ignore CR; LF will close the row
      }else cell+=ch;
    }
  }
  row.push(cell);
  if(row.some(v=>String(v).trim()!=='')) rows.push(row);
  return rows;
}
function csvToObjects(text){
  const rows=parseCSV(text);
  if(!rows.length)return [];
  const headers=rows[0].map(h=>String(h||'').trim());
  return rows.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]!==undefined?r[i]:'');return o;});
}
function numFromCSV(v){
  if(v===undefined||v===null)return 0;
  const n=Number(String(v).replace(/,/g,'').trim());
  return Number.isFinite(n)?n:0;
}
function normalizeStaffLine(line){
  const x=String(line||'').trim();
  if(x==='7.4 Staff - Partnership')return '6.2 Staff - BD & Partnership';
  return x;
}
function staffCostMonthIndexes(){
  const mode=document.getElementById('staffCostApply')?.value||'T6_T9';
  if(mode==='T6')return [1];
  if(mode==='T5')return [0];
  if(mode==='T5_T9')return [0,1,2,3,4];
  return [1,2,3,4]; // T6–T9 default
}
function applyStaffCostObjects(rows){
  const scopeCols=[
    {key:'BU12|SBH - Own channel', col:'SBH Own Channel Cost (VND)'},
    {key:'BU12|SBH - Partnership', col:'SBH Partnership Cost (VND)'},
    {key:'BU12|HLB', col:'HLB Cost (VND)'},
    {key:'BU3', col:'BU3 — FinanOne Cost (VND)'},
    {key:'CSS', col:'Corp. Shared Svc Cost (VND)'}
  ];
  const agg={}; let activeRows=0, sourceRows=0;
  rows.forEach(r=>{
    const statusTxt=String(r['Status']||'').trim().toLowerCase();
    if(statusTxt && statusTxt!=='active')return;
    activeRows++; sourceRows++;
    const l2=normalizeStaffLine(r['P&L Line']);
    if(!l2)return;
    scopeCols.forEach(sc=>{
      const amount=numFromCSV(r[sc.col])/1000000; // planning tool unit = M VND
      if(Math.abs(amount)<0.000001)return;
      const k=sc.key+'||'+l2;
      agg[k]=(agg[k]||0)+amount;
    });
  });
  const monthIdx=staffCostMonthIndexes();
  let applied=0, unmatched=[];
  Object.entries(agg).forEach(([compound,amount])=>{
    const [key,l2]=compound.split('||');
    const exists=flattenCOAFor(key).some(c=>c.l2===l2);
    if(!exists){unmatched.push(`${sourceLabel(key)} → ${l2}: ${fmt(amount)}`);return;}
    const D=kstore(key);
    if(!Array.isArray(D[l2]))D[l2]=defaultManual(key,l2);
    monthIdx.forEach(i=>{D[l2][i]=amount;});
    applied++;
  });
  STATE.staffCostImportLast={
    importedAt:new Date().toISOString(),
    mode:document.getElementById('staffCostApply')?.value||'T6_T9',
    activeRows, appliedLines:applied, unmatched
  };
  scheduleSave(); render();
  const monthText=(document.getElementById('staffCostApply')?.selectedOptions?.[0]?.textContent||'selected months').replace('Apply ','');
  const msg=`Imported staff cost CSV · ${applied} line/scope totals applied to ${monthText}`+(unmatched.length?` · ${unmatched.length} unmatched skipped`:``);
  status(msg, unmatched.length?'warn':'ok');
  if(unmatched.length){
    console.warn('Unmatched staff cost lines:', unmatched);
    alert(msg+'\n\nSkipped unmatched lines:\n'+unmatched.slice(0,12).join('\n')+(unmatched.length>12?'\n...':''));
  }
}
function importStaffCostFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const rows=csvToObjects(reader.result);
      if(!rows.length)throw new Error('CSV is empty');
      if(!Object.prototype.hasOwnProperty.call(rows[0],'P&L Line'))throw new Error('Missing P&L Line column');
      applyStaffCostObjects(rows);
    }catch(e){status('Staff cost import failed: '+e.message,'err');}
  };
  reader.readAsText(file);
}

function setDeep(obj,path,val,i){
  // Direct P&L line keys contain dots (e.g. "6.4 Staff - Technology", "7.99 Khác").
  // Treat them as literal keys unless the path is an explicit nested driver path such as accounts.0.arpu.
  const isIndexed = i!==undefined && i!=='';
  const isNested = path.startsWith('accounts.');
  if(Object.prototype.hasOwnProperty.call(obj,path) || (!isNested && isIndexed)){
    if(!Object.prototype.hasOwnProperty.call(obj,path)) obj[path]=arr();
    if(isIndexed) obj[path][Number(i)]=Number(val||0);
    else if(Array.isArray(obj[path])) obj[path]=FORECAST_MONTHS.map(()=>Number(val||0));
    else if(typeof obj[path]==='number') obj[path]=Number(val||0);
    else obj[path]=val;
    return;
  }
  const parts=path.split('.');let o=obj;
  for(let j=0;j<parts.length-1;j++){
    if(o[parts[j]]===undefined) o[parts[j]]={};
    o=o[parts[j]];
  }
  const last=parts[parts.length-1];
  if(isIndexed){ if(!Array.isArray(o[last])) o[last]=arr(); o[last][Number(i)]=Number(val||0); }
  else if(typeof o[last]==='number')o[last]=Number(val||0);
  else o[last]=val;
}

    row.vals.forEach((v,i)=>setSpanValue(vals[i],v));

    card.classList.toggle('zero',zero);
    const badge=card.querySelector('.line-head .pill.warn, .line-head .pill:not(.V):not(.F):not(.method)');
    if(badge){badge.textContent=zero?'Zero / check':'Covered';badge.classList.toggle('warn',zero);}
  });
  const byG={1:B.rev,2:B.disc,3:B.cogs,4:B.sell,5:B.mkt,6:B.staff6,7:B.opex7};
  Object.keys(byG).forEach(g=>{
    const arrRows=byG[g]||[];
    const el=document.querySelector(`[data-group-sum="${g}"]`);
    if(el){const act=actualSubtotal(key,arrRows), fvals=B.sumRows(arrRows);el.textContent=`T4 Actual: ${fmt(act)} · Forecast T5–T9: ${fmt(sum(fvals))}`;}
  });
  const subVals={
    'Total Revenue':{actual:actualSubtotal(key,B.rev),forecast:B.totRev},
    'Net Revenue':{actual:actualSubtotal(key,B.rev)+actualSubtotal(key,B.disc),forecast:B.netRev},
    'CONTRIBUTION MARGIN':{actual:actualSubtotal(key,[...B.rev,...B.disc,...B.cogs,...B.sell,...B.mkt]),forecast:B.cm},
    'OPERATING PROFIT':{actual:actualSubtotal(key,[...B.rev,...B.disc,...B.cogs,...B.sell,...B.mkt,...B.staff6,...B.opex7]),forecast:B.op}
  };
  Object.entries(subVals).forEach(([label,vals])=>{
    const strip=document.querySelector(`.subtotal-strip[data-subtotal="${label}"]`);
    if(!strip)return;
    const spans=[...strip.querySelectorAll('span')].slice(1);
    setSpanValue(spans[0],vals.actual||0);
    vals.forecast.forEach((v,i)=>setSpanValue(spans[i+1],v));
    setSpanValue(spans[vals.forecast.length+1],sum(vals.forecast));
  });
  if(key==='BU12|HLB'){
    const kpi=document.querySelector('.hlb-kpis');
    if(kpi)kpi.outerHTML=renderHLBRollup();
  }
}

function aoaToSheet(aoa){
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const widths=[];
  aoa.forEach(row=>row.forEach((cell,i)=>{const len=String(cell===undefined||cell===null?'':cell).length; widths[i]=Math.max(widths[i]||8, Math.min(Math.max(len+2,10),42));}));
  ws['!cols']=widths.map(w=>({wch:w}));
  return ws;
}
function addSheet(wb,name,aoa){
  const safe=String(name).slice(0,31).replace(/[\\/?*\[\]:]/g,' ');
  XLSX.utils.book_append_sheet(wb,aoaToSheet(aoa),safe);
}
function rowsToExportAOA(title,rows,months){
  const B=plBlocksGeneric(rows,months);
  const out=[[title],['P&L Line','Type','Behavior',...months.map(m=>MLBL[m]||m),'Total']];
  const pushLine=(label,type,beh,vals)=>out.push([label,type,beh,...vals.map(v=>Number(v.toFixed(6))),Number(sum(vals).toFixed(6))]);
  const pushGroup=(label,rs)=>{
    if(!rs.length)return;
    const vals=months.map((_,i)=>rs.reduce((a,r)=>a+r.vals[i],0));
    pushLine(label,'L1 subtotal','',vals);
    rs.forEach(r=>pushLine(r.l2,'Line item',r.beh,r.vals));
  };
  pushGroup('1. Total Revenue',B.rev); pushLine('Total Revenue','Subtotal','',B.totRev);
  pushGroup('2. Discount',B.disc); pushLine('Net Revenue','Subtotal','',B.netRev);
  pushGroup('3. Total COGS',B.cogs); pushGroup('4. Selling expense',B.sell); pushGroup('5. Marketing expenses (Variable)',B.mkt);
  pushLine('CONTRIBUTION MARGIN','Subtotal','',B.cm);
  pushGroup('6. Staff cost — Operation (Fixed)',B.staff6); pushGroup('7. Operating expenses (Fixed / Manual)',B.opex7);
  pushLine('OPERATING PROFIT','Subtotal','',B.op);
  return out;
}
function buildMetadataAOA(){

function buildCOAAOA(){
  const out=[['Scope','L1','L2','Behavior','Department','Account','Partner','Description','Method','Formula / Note']];
  allSourceKeys().forEach(key=>flattenCOAFor(key).forEach(c=>{
    out.push([sourceLabel(key),c.l1,c.l2,c.beh,c.dept||'',c.acc||'',c.ptn||'',c.desc||'',methodFor(key,c.l2),formulaFor(key,c.l2)]);
  }));
  return out;
}
function buildDriversAOA(){
  const out=[['Scope','Driver / Line','Subkey','Type',...FORECAST_MONTHS.map(m=>MLBL[m]),'Scalar / Text']];
  const pushArr=(scope,name,sub,vals)=>out.push([scope,name,sub,'monthly',...FORECAST_MONTHS.map((_,i)=>Number((Number(vals[i]||0)).toFixed(6))),'']);
  allSourceKeys().forEach(key=>{
    const scope=sourceLabel(key), D=kstore(key);
    Object.keys(D).sort().forEach(name=>{
      const val=D[name];
      if(Array.isArray(val) && name!=='accounts') pushArr(scope,name,'',val);
      else if(name==='accounts' && Array.isArray(val)){
        val.forEach((ka,idx)=>{
          out.push([scope,'Partnership account','KA '+(idx+1)+' name','text','','','','','',ka.name||'']);
          out.push([scope,'Partnership account','KA '+(idx+1)+' service type','text','','','','','',ka.type||'']);
          pushArr(scope,'Partnership account','KA '+(idx+1)+' new users/volume',ka.newUsers||arr());
          pushArr(scope,'Partnership account','KA '+(idx+1)+' net ARPU/price',ka.arpu||arr());
        });
      } else if(typeof val==='number' || typeof val==='string') out.push([scope,name,'','scalar','','','','','',val]);
    });
  });
  return out;
}
function buildSegmentWorksheetAOA(){
  const out=[['Scope','L1','L2','Behavior','Method','T4 Actual Excl Adj',...FORECAST_MONTHS.map(m=>MLBL[m]),'Forecast Total T5-T9']];
  allSourceKeys().forEach(key=>{
    forecastRows(key).forEach(r=>{
      out.push([sourceLabel(key),r.l1,r.l2,r.beh,methodFor(key,r.l2),Number(actualLine(key,r.l2).toFixed(6)),...r.vals.map(v=>Number(v.toFixed(6))),Number(sum(r.vals).toFixed(6))]);
    });
  });
  return out;
}
function buildBUForecastAOA(){
  const out=[['Scope','P&L Line','Type','Behavior',...ALL_MONTHS.map(m=>MLBL[m]),'Total']];
  const scopes=[
    ['BU12 — Sổ Bán Hàng',scopeRows('BU12','actualForecast')],
    ['BU12 — SBH Own channel',actualPlusForecastRows('BU12|SBH - Own channel')],
    ['BU12 — SBH Partnership',actualPlusForecastRows('BU12|SBH - Partnership')],
    ['BU12 — HLB',actualPlusForecastRows('BU12|HLB')],
    ['BU3 — FinanOne',actualPlusForecastRows('BU3')],
    ['Corporate Shared Service',actualPlusForecastRows('CSS')]
  ];
  scopes.forEach(([scope,rows])=>{
    const block=rowsToExportAOA(scope,rows,ALL_MONTHS).slice(1);
    block.slice(1).forEach(r=>out.push([scope,...r]));
  });
  return out;
}
function buildCompanyForecastAOA(){
  const rows=mergeRows(['BU12','BU3','CSS'].map(k=>scopeRows(k,'actualForecast')));
  return rowsToExportAOA('Consolidated Company — Actual T1-T4 + Forecast T5-T9',rows,ALL_MONTHS);
}
function buildStaffCostAOA(){
  const out=[['Scope','P&L Line','T4 Actual Excl Adj',...FORECAST_MONTHS.map(m=>MLBL[m]),'Forecast Total T5-T9','Source']];
  allSourceKeys().forEach(key=>{
    forecastRows(key).filter(r=>/staff/i.test(r.l2)).forEach(r=>{
      out.push([sourceLabel(key),r.l2,Number(actualLine(key,r.l2).toFixed(6)),...r.vals.map(v=>Number(v.toFixed(6))),Number(sum(r.vals).toFixed(6)),STATE.staffCostImportLast?'Current drivers; staff CSV may have been applied':'Current drivers']);
    });
  });
  return out;
}
function exportExcelModel(){
  if(!window.XLSX){
    alert('Excel export library chưa tải được. Hãy mở file khi có internet hoặc thử lại sau khi trang tải xong.');
    status('Excel export failed: XLSX library not loaded','err');
    return;
  }
  try{
    const wb=XLSX.utils.book_new();
    addSheet(wb,'00_Metadata',buildMetadataAOA());
    addSheet(wb,'01_Assumptions_Drivers',buildDriversAOA());
    addSheet(wb,'02_Segment_Worksheet',buildSegmentWorksheetAOA());
    addSheet(wb,'03_BU_Forecast_PL',buildBUForecastAOA());
    addSheet(wb,'04_Company_Forecast_PL',buildCompanyForecastAOA());
    addSheet(wb,'05_Staff_Cost',buildStaffCostAOA());
    addSheet(wb,'06_COA_Model',buildCOAAOA());
    const file='finan_financial_planning_model_'+new Date().toISOString().slice(0,10)+'.xlsx';
    XLSX.writeFile(wb,file);
    status('Excel model exported','ok');
  }catch(e){
    console.error(e);
    status('Excel export failed: '+e.message,'err');
    alert('Excel export failed: '+e.message);
  }
}
