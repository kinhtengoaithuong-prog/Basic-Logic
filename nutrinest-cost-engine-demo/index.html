:root{--ink:#0D1B2A;--navy:#1A2E4A;--steel:#2C4A6E;--plat:#C8A96E;--surface:#16263b;--surface2:#1d3450;--border:#2C4A6E;--border2:#3a5a82;--text:#E8EDF4;--sub:#9DB2CC;--dim:#5d7595;--green:#3BC871;--red:#E05555;--amber:#E0A23B;--teal:#46C4B8;--purple:#9B8CFF;--fh:'Outfit',sans-serif;--fm:'DM Mono',monospace;--fd:'DM Serif Display',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fh);background:var(--ink);color:var(--text);line-height:1.55;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:0 0 50px}
.hdr{background:linear-gradient(135deg,#0D1B2A,#16263b);border-bottom:1px solid var(--border);padding:22px 28px 0}
.eyebrow{font-family:var(--fm);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--plat);margin-bottom:6px}
.hdr h1{font-family:var(--fd);font-size:23px;font-weight:400;color:#fff}
.hdr-sub{font-size:12.5px;color:var(--sub);margin-top:5px;max-width:760px;padding-bottom:16px}
.tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.tab{padding:9px 14px;font-size:12px;font-weight:500;color:var(--sub);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--fh);display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--plat);border-bottom-color:var(--plat)}
.tab .code{font-family:var(--fm);font-size:9px;background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--sub)}
.tab.active .code{background:rgba(200,169,110,.18);color:var(--plat)}
.tab .dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.tab .dot.live{background:var(--green)}
.ovbadge{background:var(--amber);color:var(--ink);font-size:9px;font-weight:700;border-radius:9px;padding:0 5px}
/* layout 20/80 */
.layout{display:grid;grid-template-columns:210px 1fr;gap:0;min-height:560px}
@media(max-width:820px){.layout{grid-template-columns:1fr}}
.side{border-right:1px solid var(--border);padding:16px 12px;background:#101f33}
.side-grp{margin-bottom:20px}
.side-grp .gl{font-family:var(--fm);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:0 8px 8px}
.navitem{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--sub);margin-bottom:2px;transition:all .12s}
.navitem:hover{background:var(--surface);color:var(--text)}
.navitem.active{background:rgba(200,169,110,.12);color:var(--plat);font-weight:500}
.navitem .ic{font-family:var(--fd);font-size:14px;width:18px;text-align:center}
.navitem .nbadge{margin-left:auto;font-family:var(--fm);font-size:9px;background:var(--amber);color:var(--ink);border-radius:8px;padding:1px 6px;font-weight:700}
.navitem .ndot{margin-left:auto;width:7px;height:7px;border-radius:50%}
.main{padding:0;min-width:0;overflow:hidden}
.tbar{padding:14px 22px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.btn{background:none;border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:7px 13px;font-family:var(--fh);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.btn:hover{border-color:var(--plat);color:var(--plat)}
.btn-gold{background:var(--plat);border-color:var(--plat);color:var(--ink);font-weight:600}
.btn-gold:hover{background:#d9bd87}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:5px 9px;font-size:11px}
.save{font-family:var(--fm);font-size:11px;color:var(--dim);margin-left:auto}
.panel{padding:20px 22px}
.panel h2{font-family:var(--fd);font-size:18px;font-weight:400;margin-bottom:3px}
.panel .ph-sub{font-size:12.5px;color:var(--sub);margin-bottom:16px}
.pill{font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--sub)}
.pill.pat{color:var(--purple);border-color:rgba(155,140,255,.4)}
.banner{margin-bottom:14px;padding:11px 15px;border-radius:8px;font-size:12.5px;line-height:1.5}
.banner.seed{background:rgba(224,162,59,.08);border:1px solid rgba(224,162,59,.3);color:#e8cfa0}
.banner.seed b{color:var(--amber)}
.banner.live{background:rgba(70,196,184,.08);border:1px solid rgba(70,196,184,.3);color:#a8e0d8}
.banner.live b{color:var(--teal)}
.banner.err{background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.35);color:#f0b0b0}
.banner.err b{color:var(--red)}
.empty{text-align:center;padding:54px 20px;color:var(--sub)}
.empty .big{font-size:15px;margin-bottom:8px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
@media(max-width:680px){.stat-row{grid-template-columns:1fr 1fr}}

.stat .val{font-family:var(--fd);font-size:20px;color:var(--plat);margin-top:3px}
.stat .val.sm{font-size:13.5px}
table.je{width:100%;border-collapse:collapse;font-size:12px}
table.je th{font-family:var(--fm);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);text-align:right;padding:8px 10px;border-bottom:1px solid var(--border2);position:sticky;top:0;background:#13233a}
table.je th.l{text-align:left}
table.je td{padding:7px 10px;border-bottom:1px solid rgba(44,74,110,.4);text-align:right;font-family:var(--fm)}
table.je td.l{text-align:left;font-family:var(--fh)}
table.je tr:hover td{background:rgba(200,169,110,.05)}
.dr{color:var(--teal)}.cr{color:var(--purple)}
.grp td{background:rgba(200,169,110,.08)!important;color:var(--plat);font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:var(--fm)}
.scroll{max-height:440px;overflow:auto;border:1px solid var(--border);border-radius:9px}
.more{padding:8px 14px;font-size:11px;color:var(--dim);font-family:var(--fm)}
/* rule */
.rule-grid{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:14px}
.rl{font-family:var(--fm);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);display:block}
.rv{font-size:15px;margin-top:3px}.rv.pat{color:var(--purple);font-family:var(--fm);font-size:13px}
.gl-in{width:74px;background:var(--ink);border:1px solid var(--border2);color:var(--teal);border-radius:5px;padding:4px 7px;font-family:var(--fm);font-size:12px}
.gl-in:focus{outline:none;border-color:var(--plat)}
.mono{font-family:var(--fm)}

.pv-note{padding:10px 14px;font-size:12px;color:var(--sub);background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;line-height:1.5}
.ov-chip{background:rgba(224,162,59,.2);color:var(--amber);padding:1px 6px;border-radius:4px;font-size:11px}
.rst-all{color:var(--amber);cursor:pointer;text-decoration:underline;margin-left:6px}
table.je.pv td.cell{padding:4px 6px;position:relative}
.pv-in{width:94px;background:transparent;border:1px solid transparent;color:var(--text);border-radius:4px;padding:4px 6px;font-family:var(--fm);font-size:12px;text-align:right}
.pv-in:hover{border-color:var(--border2)}
.pv-in:focus{outline:none;border-color:var(--plat);background:var(--ink)}
.pv-in.ov{color:var(--amber);background:rgba(224,162,59,.1);border-color:rgba(224,162,59,.35);font-weight:500}
.cell .rst{position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--amber);cursor:pointer;font-size:12px}
td.rtot{color:var(--plat);font-weight:500}.ov-dot{color:var(--amber);font-size:9px}
/* summary */
.acct-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:680px){.acct-wrap{grid-template-columns:1fr}}
.acct-side h4{font-family:var(--fm);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.acct-side.drs h4{color:var(--teal)}.acct-side.crs h4{color:var(--purple)}
table.acct{width:100%;border-collapse:collapse;font-size:12.5px}
table.acct td{padding:7px 4px;border-bottom:1px solid rgba(44,74,110,.4);font-family:var(--fm)}
table.acct td.amt{text-align:right}
table.acct .tname{color:var(--sub);font-family:var(--fh);font-size:11.5px}
table.acct tr.sub td{border-top:2px solid var(--border2);border-bottom:none;padding-top:9px;color:var(--plat);font-weight:500}
.acct-bar{height:6px;border-radius:3px;margin-top:3px}
.tk.drs{color:var(--teal)}.tk.crs{color:var(--purple)}
.bal{margin-top:16px;padding:12px 16px;border-radius:8px;font-family:var(--fm);font-size:13px;display:flex;justify-content:space-between;background:rgba(59,200,113,.1);border:1px solid rgba(59,200,113,.3);color:var(--green)}
/* preset */
.preset-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;font-size:12px;color:var(--sub);cursor:default;margin-bottom:3px;background:var(--surface);border:1px solid var(--border)}
.preset-item .pn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-item .pa{color:var(--teal);cursor:pointer;font-size:11px}
.preset-item .pd{color:var(--red);cursor:pointer;font-size:13px}
.preset-empty{font-size:11px;color:var(--dim);padding:6px 9px;font-style:italic}
.mini{width:100%;background:var(--ink);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 9px;font-family:var(--fh);font-size:12px;margin-bottom:6px}
.mini:focus{outline:none;border-color:var(--plat)}
.foot{padding:14px 22px 0;font-size:11px;color:var(--dim);font-family:var(--fm)}
.hidden{display:none}

const ACCT_NAMES={"641101":"CP nhân viên BH (GT)","641102":"CP nhân viên BH (MT)","641103":"CP nhân viên BH (kênh khác)","641701":"CP vận chuyển","641704":"CP khuyến mại/thưởng","641801":"CP công tác","641802":"CP nhiên liệu","334101":"Phải trả người lao động","338301":"BHXH phải nộp","338401":"BHYT phải nộp","338601":"BHTN phải nộp","338201":"KPCĐ phải nộp","331":"Phải trả người bán","1331":"Thuế GTGT được khấu trừ"};
function cfgOf(k){return TAB_CONFIGS.find(c=>c.key===k);}
function curComps(k){return STATE[k].rule.components;}

function cleanRecords(arr,cfg){
  const fields=cfg.components.map(c=>c.field);
  return (arr||[]).filter(r=>{
    if(!r)return false;const c=(r.customer||'').toString().trim();
    if(!c||/total|tổng|grand/i.test(c))return false;
    return fields.reduce((s,f)=>s+(+r[f]||0),0)>0;
  });
}

// OVERRIDE
function ovKey(c,f){return c+'|'+f;}
function effective(key,rec,field){const ov=STATE[key].overrides,k=ovKey(rec.customer,field);return (k in ov)?ov[k]:(+rec[field]||0);}
function isOverridden(key,c,f){return ovKey(c,f) in STATE[key].overrides;}
function setOverride(c,f,v){STATE[activeKey].overrides[ovKey(c,f)]=Math.round(parseFloat((v||'').toString().replace(/[^\d.-]/g,''))||0);renderMain();autosave();}
function resetCell(c,f){delete STATE[activeKey].overrides[ovKey(c,f)];renderMain();autosave();}
function resetAllOv(){STATE[activeKey].overrides={};renderMain();autosave();}
function ovCount(key){return Object.keys(STATE[key].overrides).length;}

// ENGINE
function buildJournal(key){
  const S=STATE[key],lines=[];
  S.data.forEach(rec=>{curComps(key).forEach(m=>{
    const v=effective(key,rec,m.field);if(Math.abs(v)<0.5)return;
    lines.push({label:m.label,dim:rec.name||rec.customer,cust:rec.customer,debit:m.debit,credit:m.credit,ce:m.ce||'',amount:v,field:m.field});
  });});
  return {lines,tot:lines.reduce((s,l)=>s+l.amount,0)};
}

// AUTOSAVE
function autosave(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({state:STATE,active:activeKey,sec:activeSec,ts:Date.now()}));flagSave('✓ Đã tự lưu '+new Date().toLocaleTimeString('vi-VN'));}
  catch(e){flagSave('⚠ Tự lưu tắt — dùng 💾');}
}
function tryRestore(){
  try{const raw=localStorage.getItem(LS_KEY);if(raw){const st=JSON.parse(raw);
    if(st&&st.state){Object.keys(st.state).forEach(k=>{if(STATE[k])STATE[k]=st.state[k];});if(st.active)activeKey=st.active;if(st.sec)activeSec=st.sec;flagSave('↺ Khôi phục '+new Date(st.ts).toLocaleString('vi-VN'));}}}catch(e){}
  try{const p=localStorage.getItem(PRESET_KEY);if(p)PRESETS=JSON.parse(p)||[];}catch(e){}
}
function savePresets(){try{localStorage.setItem(PRESET_KEY,JSON.stringify(PRESETS));}catch(e){}}
function flagSave(m){const el=document.getElementById('saveStatus');if(el)el.textContent=m;}

// PRESET library (config thuần: pattern + components + colmap)
function snapshotConfig(key){const S=STATE[key];return{pattern:S.rule.pattern,components:clone(S.rule.components),colmap:clone(S.rule.colmap||cfgOf(key).colmap)};}
function saveCurrentPreset(){
  const nameEl=document.getElementById('presetName');
  const name=(nameEl&&nameEl.value||'').trim()||(cfgOf(activeKey).name+' '+new Date().toLocaleDateString('vi-VN'));
  const snap=snapshotConfig(activeKey);
  PRESETS.push({id:'p'+Date.now(),name,...snap,ts:Date.now()});
  savePresets();renderMain();flagSave('✓ Đã lưu preset “'+name+'”');
}
function applyPreset(id){
  const p=PRESETS.find(x=>x.id===id);if(!p)return;
  STATE[activeKey].rule={pattern:p.pattern,components:clone(p.components),colmap:clone(p.colmap)};
  renderAll();autosave();flagSave('✓ Đã áp preset “'+p.name+'” vào '+cfgOf(activeKey).name);
}
function deletePreset(id){PRESETS=PRESETS.filter(x=>x.id!==id);savePresets();renderMain();}
function exportPresets(){
  const blob=new Blob([JSON.stringify({presets:PRESETS,ts:Date.now()},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='idealab_presets_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
  flagSave('💾 Đã xuất '+PRESETS.length+' preset');
}
function pickPresetFile(){document.getElementById('presetInput').click();}
function onPresetFile(ev){
  const file=ev.target.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=e=>{try{const j=JSON.parse(e.target.result);const arr=j.presets||j;if(!Array.isArray(arr))throw new Error('Sai định dạng');
    const ids=new Set(PRESETS.map(p=>p.id));arr.forEach(p=>{if(!ids.has(p.id))PRESETS.push(p);});savePresets();renderMain();flagSave('✓ Nhập '+arr.length+' preset');
  }catch(err){flagSave('✗ Lỗi nhập preset: '+err.message);}};
  reader.readAsText(file);ev.target.value='';
}

// IMPORT
function pickFile(){document.getElementById('fileInput').click();}
function onFilePicked(ev){
  const file=ev.target.files[0];if(!file)return;const cfg=cfgOf(activeKey);const reader=new FileReader();
  reader.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const recs=cleanRecords(parseSheet(wb,cfg),cfg);
    if(!recs.length){flagSave('✗ Không thấy dòng hợp lệ');renderMain('Không thấy dòng hợp lệ trong file. Cần cột mã đối tượng và ít nhất một cấu phần.');return;}
    STATE[activeKey].data=recs;STATE[activeKey].src={label:file.name+' · '+recs.length+' dòng',type:'upload'};STATE[activeKey].overrides={};
    activeSec='data';renderAll();autosave();
  }catch(err){renderMain('Lỗi đọc file: '+err.message);}};
  reader.readAsArrayBuffer(file);ev.target.value='';
}
function parseSheet(wb,cfg){
  const cm=STATE[activeKey].rule.colmap||cfg.colmap;
  const names=wb.SheetNames;
  let target=names.find(n=>new RegExp(cfg.sheet_hint+'$','i').test(n.trim()))||names.find(n=>new RegExp(cfg.sheet_hint,'i').test(n))||names[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[target],{header:1,raw:true,defval:null});
  const custKeys=cm.customer;let hi=-1;
  for(let i=0;i<Math.min(rows.length,25);i++){const line=(rows[i]||[]).map(c=>(c==null?'':c.toString().toLowerCase()));if(line.some(c=>custKeys.some(k=>c.includes(k)))){hi=i;break;}}
  if(hi<0)throw new Error('Không định vị được dòng tiêu đề (cột: '+custKeys.join('/')+').');
  const head=rows[hi].map(c=>(c==null?'':c.toString().toLowerCase()));
  const find=keys=>head.findIndex(h=>keys.some(k=>h.includes(k)));
  const ci={};Object.keys(cm).forEach(f=>ci[f]=find(cm[f]));
  const num=v=>{if(v==null)return 0;if(typeof v==='number')return v;const n=parseFloat(v.toString().replace(/[^\d.-]/g,''));return isNaN(n)?0:n;};
  const out=[];
  for(let i=hi+1;i<rows.length;i++){const r=rows[i];if(!r)continue;const cust=ci.customer>=0?r[ci.customer]:null;if(!cust)continue;
    const rec={customer:(cust||'').toString().trim(),name:(ci.name>=0?r[ci.name]:'')||'',dept:(ci.dept>=0?r[ci.dept]:'')||''};
    cfg.components.forEach(m=>{rec[m.field]=Math.round(num(ci[m.field]>=0?r[ci[m.field]]:0));});out.push(rec);}
  return out;
}

// STATE save/load/clear
function saveStateFile(){const blob=new Blob([JSON.stringify({state:STATE,active:activeKey,ts:Date.now()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nutrinest_state_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);flagSave('💾 Đã lưu trạng thái');}
function pickState(){document.getElementById('stateInput').click();}
function onStatePicked(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const st=JSON.parse(e.target.result);if(!st||!st.state)throw new Error('File không hợp lệ');Object.keys(st.state).forEach(k=>{if(STATE[k])STATE[k]=st.state[k];});if(st.active)activeKey=st.active;renderAll();autosave();}catch(err){renderMain('File trạng thái lỗi: '+err.message);}};reader.readAsText(file);ev.target.value='';}
function clearTab(){const c=cfgOf(activeKey);STATE[activeKey]={data:[],src:{label:'Chưa có dữ liệu',type:'empty'},overrides:{},rule:clone({pattern:c.pattern,components:c.components,colmap:c.colmap})};activeSec='data';renderAll();autosave();}
function editGL(i,side,val){curComps(activeKey)[i][side]=val.trim();renderMain();autosave();}

// EXPORT
function exportXlsx(){const cfg=cfgOf(activeKey),J=buildJournal(activeKey);if(!J.lines.length){flagSave('✗ Chưa có dữ liệu');return;}
  const data=[['NutriNest — '+cfg.code+' '+cfg.name+' — JE'],[STATE[activeKey].src.label],[ovCount(activeKey)?('Có '+ovCount(activeKey)+' ô điều chỉnh tay'):'Không điều chỉnh tay'],[],['Cấu phần',cfg.dim_label,'Mã','Nợ','Có','CE','Số tiền','Sửa tay?']];
  J.lines.forEach(l=>data.push([l.label,l.dim,l.cust,l.debit,l.credit,l.ce,Math.round(l.amount),isOverridden(activeKey,l.cust,l.field)?'CÓ':'']));
  data.push(['','','','','','TỔNG',Math.round(J.tot),'']);
  const drA={},crA={};J.lines.forEach(l=>{drA[l.debit]=(drA[l.debit]||0)+l.amount;crA[l.credit]=(crA[l.credit]||0)+l.amount;});
  data.push([],['TÁC ĐỘNG ĐẦU TÀI KHOẢN'],['Đầu TK','Tên','Bên','','','','Số tiền']);
  Object.keys(drA).sort().forEach(k=>data.push([k,ACCT_NAMES[k]||'','Nợ','','','',Math.round(drA[k])]));
  Object.keys(crA).sort().forEach(k=>data.push([k,ACCT_NAMES[k]||'','Có','','','',Math.round(crA[k])]));
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:22},{wch:32},{wch:10},{wch:8},{wch:8},{wch:7},{wch:15},{wch:11}];
  XLSX.utils.book_append_sheet(wb,ws,cfg.code);XLSX.writeFile(wb,'JE_NutriNest_'+cfg.code+'.xlsx');
}

// ───── RENDER ─────
function renderAll(){renderTabs();renderSide();renderMain();}
function tbar(){const S=STATE[activeKey],cfg=cfgOf(activeKey);
  return `<div class="tbar">
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="onFilePicked(event)"/>
    <input type="file" id="stateInput" accept=".json" style="display:none" onchange="onStatePicked(event)"/>
    <input type="file" id="presetInput" accept=".json" style="display:none" onchange="onPresetFile(event)"/>
    <button class="btn btn-gold" onclick="pickFile()">⬆ Nạp file — ${cfg.name}</button>
    <button class="btn" onclick="exportXlsx()" ${S.data.length?'':'disabled'}>⬇ Export JE</button>
    <button class="btn" onclick="saveStateFile()">💾 Lưu</button>
    <button class="btn" onclick="pickState()">📂 Nạp lại</button>
    <button class="btn" onclick="clearTab()" ${S.data.length?'':'disabled'}>🗑 Xoá</button>
    <span class="save" id="saveStatus"></span></div>`;
}
function renderMain(errMsg){
  const cfg=cfgOf(activeKey),S=STATE[activeKey];
  let inner='';
  if(activeSec==='preset'){inner=panelPreset(cfg,S);}
  else if(!S.data.length){
    inner=`<div class="panel"><div class="empty"><div class="big">Tab <b style="color:var(--plat)">${cfg.name}</b> chưa có dữ liệu</div><div style="font-size:12.5px">Bấm <b style="color:var(--plat)">"Nạp file"</b> ở trên. Engine sẽ đọc → phân bổ (<b style="color:var(--purple)">${cfg.pattern}</b>) → sinh bút toán → tác động tài khoản.</div></div></div>`;
  }else{
    const J=buildJournal(activeKey);
    if(activeSec==='data')inner=panelData(cfg,S);
    else if(activeSec==='rule')inner=panelRule(cfg,S);
    else if(activeSec==='preview')inner=panelPreview(cfg,S);
    else if(activeSec==='je')inner=panelJE(cfg,J);
    else if(activeSec==='summary')inner=panelSummary(cfg,J);
  }
  const err=errMsg?`<div class="banner err"><b>✗</b> ${errMsg}</div>`:'';
  document.getElementById('main').innerHTML=tbar()+'<div class="panel">'+err+inner+'</div>';
  renderSide();
}

function srcBanner(S){return S.src.type==='upload'?`<div class="banner live"><b>✓ File bạn nạp:</b> ${S.src.label}.</div>`:S.src.type==='seed'?`<div class="banner seed"><b>Dữ liệu mẫu:</b> ${S.src.label}.</div>`:'';}

function panelData(cfg,S){
  const ths=cfg.components.map(m=>`<th>${m.label.split(' ')[0]}</th>`).join('');

  return `<h2>① Dữ liệu nguồn</h2><div class="ph-sub">${S.data.length} ${cfg.dim_label} · engine đã đọc & làm sạch (loại dòng tổng/rỗng).</div>${srcBanner(S)}

    ${S.data.length>300?`<div class="more">+ ${S.data.length-300} dòng nữa…</div>`:''}`;

function panelRule(cfg,S){

    <div class="rule-grid"><div><span class="rl">Pattern phân bổ</span><div class="rv pat">${cfg.pattern}</div></div><div><span class="rl">Đối tượng</span><div class="rv">${cfg.dim_label}</div></div><div><span class="rl">Số cấu phần</span><div class="rv">${curComps(activeKey).length}</div></div></div>
    <table class="je"><thead><tr><th class="l">Cấu phần</th><th class="l">Field</th><th class="l">Nợ</th><th class="l">Có</th><th class="l">CE</th></tr></thead><tbody>${rows}</tbody></table>
    <div style="margin-top:14px;display:flex;gap:8px;align-items:center"><input class="mini" id="presetName" placeholder="Đặt tên preset (vd: GT chuẩn MISA)" style="max-width:280px;margin:0"/><button class="btn btn-gold btn-sm" onclick="saveCurrentPreset()">⊕ Lưu cấu hình thành preset</button></div>`;
}
function panelPreview(cfg,S){
  const comps=curComps(activeKey);const nOv=ovCount(activeKey);
  const ths=comps.map(m=>`<th>${m.label.split(' ')[0]}</th>`).join('');
  const rows=S.data.slice(0,300).map(r=>{
    const tds=comps.map(m=>{const base=+r[m.field]||0,eff=effective(activeKey,r,m.field),ov=isOverridden(activeKey,r.customer,m.field);

    ${S.data.length>300?`<div class="more">+ ${S.data.length-300} dòng nữa…</div>`:''}`;

function panelJE(cfg,J){
  const g={};J.lines.forEach(l=>(g[l.label]=g[l.label]||[]).push(l));
  let h='<thead><tr><th class="l">Cấu phần / '+cfg.dim_label+'</th><th class="l">Mã</th><th>Nợ</th><th>Có</th><th>CE</th><th>Số tiền</th></tr></thead><tbody>';

    h+=`<tr class="grp"><td class="l" colspan="5">${lab} — ${rows.length} ${cfg.dim_label}</td><td>${fmt(sub)}</td></tr>`;
    rows.forEach(l=>{const ov=isOverridden(activeKey,l.cust,l.field);h+=`<tr><td class="l" style="color:var(--sub)">${l.dim}${ov?' <span class="ov-dot">●</span>':''}</td><td class="l">${l.cust}</td><td class="dr">${l.debit}</td><td class="cr">${l.credit}</td><td style="color:var(--dim)">${l.ce}</td><td>${fmt(l.amount)}</td></tr>`;});});

function panelSummary(cfg,J){
  const dr={},cr={};J.lines.forEach(l=>{dr[l.debit]=(dr[l.debit]||0)+l.amount;cr[l.credit]=(cr[l.credit]||0)+l.amount;});
  const drT=Object.values(dr).reduce((s,v)=>s+v,0),crT=Object.values(cr).reduce((s,v)=>s+v,0),mx=Math.max(...Object.values(dr),...Object.values(cr),1);
  const side=(obj,cls,col)=>{const ks=Object.keys(obj).sort((a,b)=>obj[b]-obj[a]);let h=ks.map(k=>`<tr><td class="tk ${cls}">${k}<div class="tname">${ACCT_NAMES[k]||''}</div><div class="acct-bar" style="width:${Math.round(obj[k]/mx*100)}%;background:${col}"></div></td><td class="amt">${fmt(obj[k])}</td></tr>`).join('');h+=`<tr class="sub"><td>Tổng ${cls==='drs'?'Nợ':'Có'}</td><td class="amt">${fmt(Object.values(obj).reduce((s,v)=>s+v,0))}</td></tr>`;return h;};
  const stat=`<div class="stat-row"><div class="stat"><div class="lab">${cfg.dim_label}</div><div class="val">${STATE[activeKey].data.length}</div></div><div class="stat"><div class="lab">Dòng JE</div><div class="val">${J.lines.length}</div></div><div class="stat"><div class="lab">Tổng phát sinh</div><div class="val sm">${fmt(J.tot)} đ</div></div><div class="stat"><div class="lab">Ô đã đè</div><div class="val">${ovCount(activeKey)}</div></div></div>`;
  return `<h2>⑤ Summary — tác động đầu tài khoản</h2><div class="ph-sub">Tổng hợp từ bút toán (đã gồm điều chỉnh tay).</div>${stat}
    <div class="acct-wrap"><div class="acct-side drs"><h4>▸ Bên Nợ — chi phí ghi nhận</h4><table class="acct"><tbody>${side(dr,'drs','rgba(70,196,184,.35)')}</tbody></table></div><div class="acct-side crs"><h4>◂ Bên Có — nghĩa vụ phải trả</h4><table class="acct"><tbody>${side(cr,'crs','rgba(155,140,255,.35)')}</tbody></table></div></div>
    <div class="bal"><span>✓ ΣNợ = ΣCó</span><span>${fmt(drT)} = ${fmt(crT)} đ · lệch ${fmt(Math.abs(drT-crT))}</span></div>`;
}
function panelPreset(cfg,S){
  const list=PRESETS.length?PRESETS.map(p=>{
    const comps=p.components.map(c=>`${c.field}→${c.debit}/${c.credit}`).join(' · ');
    return `<tr><td class="l">${p.name}</td><td class="l mono" style="color:var(--purple)">${p.pattern}</td><td class="l" style="color:var(--sub);font-size:11px">${comps}</td><td class="l">${new Date(p.ts).toLocaleDateString('vi-VN')}</td><td class="l"><span class="pa" style="color:var(--teal);cursor:pointer" onclick="applyPreset('${p.id}')">áp vào ${cfg.code}</span> · <span class="pd" style="color:var(--red);cursor:pointer" onclick="deletePreset('${p.id}')">xoá</span></td></tr>`;
  }).join(''):'<tr><td colspan="5" style="color:var(--dim);padding:18px;text-align:center">Chưa có preset. Vào ② Cấu hình → "Lưu cấu hình thành preset".</td></tr>';
  return `<h2>⚙ Quản lý preset cấu hình</h2><div class="ph-sub">Preset lưu cấu hình thuần (pattern + định khoản + cách map cột) — không kèm dữ liệu hay điều chỉnh tay. Tái dùng across kỳ và across khách.</div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <input class="mini" id="presetName" placeholder="Tên preset từ cấu hình tab ${cfg.code} hiện tại" style="max-width:320px;margin:0"/>
      <button class="btn btn-gold btn-sm" onclick="saveCurrentPreset()">⊕ Lưu cấu hình tab ${cfg.code}</button>
      <button class="btn btn-sm" onclick="exportPresets()">⬇ Xuất tất cả (.json)</button>
      <button class="btn btn-sm" onclick="pickPresetFile()">⬆ Nhập preset (.json)</button>
    </div>
    <div class="scroll"><table class="je"><thead><tr><th class="l">Tên preset</th><th class="l">Pattern</th><th class="l">Định khoản</th><th class="l">Ngày</th><th class="l">Thao tác</th></tr></thead><tbody>${list}</tbody></table></div>`;
}

tryRestore();renderAll();autosave();

</script>
