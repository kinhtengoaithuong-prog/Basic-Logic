<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap&subset=latin,latin-ext,vietnamese" rel="stylesheet">
<style>
:root{--ink:#0a0e1a;--ink2:#111726;--ink3:#1a2235;--line:#26304a;--line2:#323e5e;
--txt:#e8ecf5;--txt2:#a7b2cc;--txt3:#6b7894;--gold:#c9a227;--gold2:#e3bd3e;--teal:#3fb8a0;--blue:#5a8ad6;--rose:#d97862;--green:#6fae4f;--amber:#d6a23e;--purple:#8b7fd6;
--up:#6fae4f;--up-bg:rgba(111,174,79,.13);--down:#d9685f;--down-bg:rgba(217,104,95,.13);--warn:#d6a23e;--warn-bg:rgba(214,162,62,.13);
--serif:'Noto Serif Display',Georgia,serif;--sans:'Outfit',system-ui,sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--txt);font-family:var(--sans);font-weight:300;line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 0 60px}
.wrap{max-width:1180px;margin:0 auto;padding:0 26px}
header{border-bottom:1px solid var(--line);padding:30px 0 18px;margin-bottom:0}
.kicker{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.kicker .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
h1{font-family:var(--serif);font-weight:500;font-size:25px;margin-bottom:6px}
.sub{color:var(--txt2);font-size:13.5px;max-width:820px}.sub b{color:var(--txt);font-weight:500}

.tabnav{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
.tab-btn{padding:11px 17px;font-size:13.5px;font-family:var(--sans);background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);cursor:pointer;transition:.13s}
.tab-btn:hover{color:var(--txt2)}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn.simtab{margin-left:auto;color:var(--teal)}
.tab-btn.simtab.on{color:var(--teal);border-bottom-color:var(--teal)}
.pane{animation:fade .25s ease}@keyframes fade{from{opacity:0}to{opacity:1}}

/* live banner shown on report tabs */
.livebar{background:linear-gradient(90deg,rgba(63,184,160,.08),transparent);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:9px;padding:10px 15px;margin-bottom:20px;font-family:var(--mono);font-size:11.5px;color:var(--txt2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.livebar b{color:var(--teal);font-weight:500}
.livebar .pill{background:var(--ink3);padding:2px 8px;border-radius:5px;color:var(--txt2)}

/* SIM result bar */
.results{position:sticky;top:0;z-index:20;background:rgba(10,14,26,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 0;margin:0 -26px 22px}
.results .rgrid{max-width:1180px;margin:0 auto;padding:0 26px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:900px){.results .rgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.results .rgrid{grid-template-columns:repeat(2,1fr)}}
.rcard{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.rcard .rl{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcard .rv{font-family:var(--serif);font-size:19px;font-weight:500;line-height:1}
.rcard .rv.hl{color:var(--gold2)}
.rcard .rd{font-size:10px;font-family:var(--mono);margin-top:4px}
.rcard .rd.up{color:var(--up)}.rcard .rd.down{color:var(--down)}.rcard .rd.warn{color:var(--warn)}
.benchbar{max-width:1180px;margin:10px auto 0;padding:0 26px;display:flex;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10.5px}
.benchbar .bt{padding:3px 9px;border-radius:6px;background:var(--ink3);color:var(--txt3)}
.benchbar .bt b{color:var(--txt2);font-weight:500}
.benchbar .bt.hit{background:var(--up-bg);color:var(--up)}
.benchbar .bt.miss{background:var(--warn-bg);color:var(--warn)}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.controls{grid-template-columns:1fr}}
.panel{background:var(--ink2);border:1px solid var(--line);border-radius:13px;padding:18px 20px}
.panel.scale{border-top:2px solid var(--teal)}.panel.profit{border-top:2px solid var(--gold)}
.panel h3{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:3px}
.panel .ph{font-size:11px;color:var(--txt3);font-family:var(--mono);margin-bottom:16px}
.sgroup-title{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin:14px 0 10px;padding-top:12px;border-top:1px solid var(--line)}
.sgroup-title:first-of-type{border-top:none;padding-top:0;margin-top:0}
.slider{margin-bottom:15px}
.slabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.slabel .sn{font-size:12.5px;color:var(--txt2)}
.slabel .sv{font-family:var(--mono);font-size:13px;color:var(--txt);font-weight:500}
.slabel .sv .base{color:var(--txt3);font-size:10.5px;margin-left:6px}
.strack{position:relative;height:30px;display:flex;align-items:center}
.srange{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:var(--ink3);outline:none;position:relative;z-index:3}
.srange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--ink);box-shadow:0 0 0 1px var(--gold)}
.srange::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--ink)}
.basemark,.kvmark,.khmark{position:absolute;top:50%;transform:translateY(-50%);width:2px;height:14px;border-radius:1px;z-index:1;pointer-events:none}
.basemark{background:var(--blue)}.kvmark{background:var(--purple);height:11px}.khmark{background:var(--teal);height:11px}
.markrow{position:relative;height:13px;font-family:var(--mono);font-size:7px}
.mk{position:absolute;transform:translateX(-50%);white-space:nowrap}
.mk.b{color:var(--blue)}.mk.kv{color:var(--purple)}.mk.kh{color:var(--teal)}
.derived{background:var(--ink3);border-radius:9px;padding:11px 14px;margin-top:8px;font-family:var(--mono);font-size:11.5px;color:var(--txt2);line-height:1.7}
.derived b{color:var(--gold2);font-weight:500}.derived .dr{display:flex;justify-content:space-between}
.midbar{background:var(--ink2);border:1px solid var(--line);border-radius:13px;padding:16px 20px;margin:22px 0}
.midbar h3{font-family:var(--serif);font-size:16px;font-weight:500;margin-bottom:14px}
.warnrow{display:flex;gap:14px;flex-wrap:wrap}
.wbox{flex:1;min-width:150px;background:var(--ink3);border-radius:9px;padding:11px 14px;border-left:3px solid var(--line2)}
.wbox.ok{border-left-color:var(--up)}.wbox.warn{border-left-color:var(--warn)}.wbox.bad{border-left-color:var(--down)}
.wbox .wl{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.wbox .wv{font-family:var(--serif);font-size:18px;font-weight:500}.wbox .ws{font-size:10px;font-family:var(--mono);color:var(--txt3);margin-top:3px}
.actions{display:flex;gap:10px;margin:18px 0;flex-wrap:wrap}
.btn{padding:9px 16px;font-size:13px;font-family:var(--sans);border-radius:9px;border:1px solid var(--line2);background:var(--ink2);color:var(--txt2);cursor:pointer;transition:.13s}
.btn:hover{border-color:var(--gold);color:var(--txt)}
.btn.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:500}

/* REPORT tables */
.sec{margin-bottom:26px}
.sec-h{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:3px}
.sec-sub{font-size:11px;color:var(--txt3);font-family:var(--mono);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);text-align:right;padding:9px 11px;border-bottom:1px solid var(--line2);font-weight:400}
thead th:first-child{text-align:left}
thead th.planh{color:var(--teal)}
tbody td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);font-family:var(--mono)}
tbody td:first-child{text-align:left;font-family:var(--sans);color:var(--txt2)}
tbody td.planc{color:var(--teal)}
tr.total td{border-top:1px solid var(--line2);border-bottom:none;font-weight:500;color:var(--txt);padding-top:11px}
tr.total td:first-child{color:var(--txt)}
.yoy{padding:2px 7px;border-radius:5px;font-size:11px}
.yoy.up{background:var(--up-bg);color:var(--up)}.yoy.down{background:var(--down-bg);color:var(--down)}.yoy.flat{color:var(--txt3)}
.kpirow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:700px){.kpirow{grid-template-columns:1fr}}
.kpicard{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.kpicard .kl{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.kpicard .kv{font-family:var(--serif);font-size:24px;font-weight:500}
.kpicard .kp{font-family:var(--mono);font-size:12px;color:var(--teal);margin-top:6px}
.kpicard .kp .a{color:var(--txt3)}
.bars{margin-top:6px}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bname{width:160px;font-size:12px;color:var(--txt2);flex-shrink:0}
.bwrap{flex:1;height:8px;background:var(--ink3);border-radius:4px;position:relative;overflow:hidden}
.bbar{height:100%;border-radius:4px}
.bval{width:78px;text-align:right;font-family:var(--mono);font-size:12px;flex-shrink:0}
.bp{width:74px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--teal);flex-shrink:0}
.bp::before{content:"→ ";color:var(--txt3)}
.foot{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:var(--txt3);font-family:var(--mono);line-height:1.7}
</style></head>

function fmt(x){return Math.round(x).toLocaleString('vi-VN')}

// CORE ENGINE: returns full plan breakdown
function calc(){
  const lao=state.lao_dong, lao_idx=lao/B.lao_dong;
  const hdv=B.hdv*lao_idx*(state.ns_hdv/B.ns_hdv);
  const td=B.td*lao_idx*(state.ns_td/B.ns_td);
  const quy_mo=hdv+td;
  const ln_base=quy_mo*state.bien_rong/100;
  const thu_dv_delta=M.thu_dv_2025*(state.g_thu_dv/100);
  const ln_hdkd=ln_base+thu_dv_delta;
  const tong_ln=ln_hdkd+state.thu_xlrr;
  // === TÍN DỤNG breakdown (mix slider) ===
  // phân khúc áp cho phần DƯ CHO VAY (tổng td = dư cho vay + tài trợ TM/thẻ)
  const td_idx0=td/B.td;
  const du_cho_vay=B.td_du_cho_vay*td_idx0;  // scale dư cho vay theo tổng
  const td_khac=B.td_khac*td_idx0;            // tài trợ TM + thẻ
  const td_khbl=du_cho_vay*state.td_khbl_pct/100;
  const td_khdn=du_cho_vay-td_khbl;
  // ngành hàng: co giãn cùng KHDN (giữ tỷ trọng nội bộ 2025)
  const nganh_base_total=B.nganh.reduce((s,x)=>s+x[1],0);
  const td_nganh=B.nganh.map(x=>[x[0], td_khdn*(x[1]/nganh_base_total), x[1]]); // [name, plan, actual]
  // kỳ hạn vay & loại tiền: giữ cơ cấu 2025, scale theo tổng td
  const td_idx=td/B.td;
  const td_kyhan=B.kyhan_vay.map(x=>[x[0], x[1]*td_idx, x[1]]);
  const td_loaitien=B.loaitien_vay.map(x=>[x[0], x[1]*td_idx, x[1]]);
  // chất lượng nợ: NPL từ slider, còn lại scale
  const no_xau_plan=td*state.npl_target/100;
  // === HUY ĐỘNG breakdown (mix slider) ===
  const hdv_dctc=hdv*state.hdv_dctc_pct/100;
  const non_dctc=hdv-hdv_dctc;
  const hdv_khdn=non_dctc*B.hdv_khdn_share_in_nondctc;
  const hdv_khbl=non_dctc-hdv_khdn;
  const hdv_idx=hdv/B.hdv;
  const hdv_kyhan=B.kyhan_gui.map(x=>[x[0], x[1]*hdv_idx, x[1]]);
  const hdv_loaitien=B.loaitien_gui.map(x=>[x[0], x[1]*hdv_idx, x[1]]);
  return {lao,hdv,td,quy_mo,ln_hdkd,tong_ln,
    du_cho_vay,td_khac,td_khbl,td_khdn,td_nganh,td_kyhan,td_loaitien,no_xau_plan,
    hdv_dctc,hdv_khdn,hdv_khbl,hdv_kyhan,hdv_loaitien};
}
const BASE={tong_ln:B.kqkd.tong_ln,ln_hdkd:B.kqkd.ln_hdkd,hdv:B.hdv,td:B.td,bench:B.kqkd_bench.tong_ln};

// ============ SIM TAB ============
function makeSlider(sl){
  const base=sl.base(),val=state[sl.k],span=sl.max-sl.min,pct=v=>((v-sl.min)/span*100);
  let marks='<div class="markrow"><span class="mk b" style="left:'+pct(base).toFixed(1)+'%">2025</span>';
  if(sl.kv)marks+='<span class="mk kv" style="left:'+pct(sl.kv()).toFixed(1)+'%">KV</span>';
  if(sl.kh)marks+='<span class="mk kh" style="left:'+pct(sl.kh()).toFixed(1)+'%">TH</span>';
  marks+='</div>';
  let bm='<div class="basemark" style="left:calc('+pct(base).toFixed(1)+'% - 1px)"></div>';
  if(sl.kv)bm+='<div class="kvmark" style="left:calc('+pct(sl.kv()).toFixed(1)+'% - 1px)"></div>';
  if(sl.kh)bm+='<div class="khmark" style="left:calc('+pct(sl.kh()).toFixed(1)+'% - 1px)"></div>';
  return '<div class="slider"><div class="slabel"><span class="sn">'+sl.name+'</span><span class="sv" id="sv-'+sl.k+'">'+val.toFixed(sl.dec)+sl.unit+'<span class="base">2025: '+base.toFixed(sl.dec)+sl.unit+'</span></span></div><div class="strack">'+bm+'<input type="range" class="srange" min="'+sl.min+'" max="'+sl.max+'" step="'+sl.step+'" value="'+val+'" oninput="upd(\''+sl.k+'\',this.value,'+sl.dec+',\''+sl.unit+'\')"></div>'+marks+'</div>';
}
function renderSim(){
  const r=calc();
  let resHtml='<div class="results"><div class="rgrid">';
  const items=[['Tổng lợi nhuận',fmt1(r.tong_ln)+' tỷ',(r.tong_ln/BASE.tong_ln-1)*100,'%',true],
    ['LN từ HĐKD',fmt1(r.ln_hdkd)+' tỷ',(r.ln_hdkd/BASE.ln_hdkd-1)*100,'%',false],
    ['Huy động',fmt(r.hdv)+' tỷ',(r.hdv/BASE.hdv-1)*100,'%',false],
    ['Tín dụng',fmt(r.td)+' tỷ',(r.td/BASE.td-1)*100,'%',false],
    ['Lao động',r.lao+' người',r.lao-B.lao_dong,' người',false,'abs']];
  resHtml+=items.map(([l,v,dd,u,hl,mode])=>{const good=dd>=0;const cls=Math.abs(dd)<0.05?'warn':(good?'up':'down');const dtxt=mode==='abs'?((dd>=0?'+':'')+dd+u):((dd>=0?'+':'')+dd.toFixed(1)+u);return '<div class="rcard"><div class="rl">'+l+'</div><div class="rv'+(hl?' hl':'')+'">'+v+'</div><div class="rd '+cls+'">'+dtxt+' vs 2025</div></div>';}).join('');
  resHtml+='</div><div class="benchbar">';
  const bm=BASE.bench,marks=[['TB khu vực',bm.kv],['TB toàn hàng',bm.hang],['Đầu năm',bm.daunam],['TH 2025',BASE.tong_ln]];
  resHtml+='<span style="color:var(--txt3)">Tổng LN plan vs:</span>'+marks.map(([n,v])=>{const hit=r.tong_ln>=v;return '<span class="bt '+(hit?'hit':'miss')+'">'+n+' '+fmt1(v)+' <b>'+(hit?'✓':'')+(r.tong_ln>=v?'+':'')+fmt1(r.tong_ln-v)+'</b></span>';}).join('');
  resHtml+='</div></div>';

  let h=resHtml+'<div class="actions"><button class="btn" onclick="resetBase()">Về baseline 2025</button><button class="btn primary" onclick="loadStretch()">Kịch bản tăng tốc</button><button class="btn" onclick="exportCfg()">Xuất cấu hình JSON</button></div><div class="controls">';
  // scale panel
  h+='<div class="panel scale"><h3>Quy mô qua nguồn lực &amp; cơ cấu</h3><div class="ph">Huy động/tín dụng = năng suất × lao động; mix điều chỉnh phân khúc</div>';
  SCALE.forEach(sl=>{if(sl.grp){h+='<div class="sgroup-title">'+sl.grp+'</div>';return;}h+=makeSlider(sl);});
  h+='<div class="derived"><div class="dr"><span>Huy động plan</span><b>'+fmt(r.hdv)+' tỷ</b></div><div class="dr"><span>Tín dụng plan</span><b>'+fmt(r.td)+' tỷ</b></div><div class="dr"><span>· KHDN / KHBL</span><b>'+fmt(r.td_khdn)+' / '+fmt(r.td_khbl)+'</b></div></div></div>';
  // profit panel
  h+='<div class="panel profit"><h3>Chuyển quy mô thành lợi nhuận</h3><div class="ph">Biên ròng + thu DV + rủi ro</div>';
  PROFIT.forEach(sl=>{if(sl.grp){h+='<div class="sgroup-title">'+sl.grp+'</div>';return;}h+=makeSlider(sl);});
  h+='<div class="derived"><div class="dr"><span>LN từ HĐKD</span><b>'+fmt1(r.ln_hdkd)+' tỷ</b></div><div class="dr"><span>+ Thu nợ XLRR</span><b>'+fmt1(state.thu_xlrr)+' tỷ</b></div><div class="dr"><span>= Tổng lợi nhuận</span><b>'+fmt1(r.tong_ln)+' tỷ</b></div></div></div></div>';
  // warnings
  h+='<div class="midbar"><h3>Kiểm tra ràng buộc &amp; benchmark</h3><div class="warnrow" id="warnrow"></div></div>';
  document.getElementById('pane-sim').innerHTML=h;
  renderWarn(r);
}
function renderWarn(r){
  const hdvCls=state.ns_hdv>B.ns_hdv_hang*1.15?'warn':'ok';
  const tdCls=state.ns_td>B.ns_td_hang*1.4?'warn':'ok';
  const nplCls=state.npl_target>1.0?'bad':(state.npl_target>0.6?'warn':'ok');
  const laoCls=state.lao_dong>B.lao_dong*1.15?'warn':'ok';
  document.getElementById('warnrow').innerHTML=
    '<div class="wbox '+hdvCls+'"><div class="wl">Năng suất HĐ vs toàn hàng</div><div class="wv">'+(state.ns_hdv/B.ns_hdv_hang*100).toFixed(0)+'%</div><div class="ws">'+(hdvCls==='warn'?'⚠ cao bất thường':'hợp lý')+'</div></div>'+
    '<div class="wbox '+tdCls+'"><div class="wl">Năng suất TD vs toàn hàng</div><div class="wv">'+(state.ns_td/B.ns_td_hang*100).toFixed(0)+'%</div><div class="ws">'+(tdCls==='warn'?'⚠ vượt xa hệ thống':'khả thi')+'</div></div>'+
    '<div class="wbox '+nplCls+'"><div class="wl">NPL mục tiêu</div><div class="wv">'+state.npl_target.toFixed(2)+'%</div><div class="ws">'+(nplCls==='bad'?'⚠ vượt 1%':(nplCls==='warn'?'theo dõi':'tốt'))+'</div></div>'+
    '<div class="wbox '+laoCls+'"><div class="wl">Headcount</div><div class="wv">'+state.lao_dong+'</div><div class="ws">'+(laoCls==='warn'?'+'+(state.lao_dong-B.lao_dong)+' cần duyệt':'trong định biên')+'</div></div>';

function upd(k,v,dec,unit){
  state[k]=parseFloat(v);
  const sl=[...SCALE,...PROFIT].find(x=>x.k===k);
  const el=document.getElementById('sv-'+k);
  if(el)el.innerHTML=parseFloat(v).toFixed(dec)+unit+'<span class="base">2025: '+sl.base().toFixed(dec)+unit+'</span>';
  // refresh derived boxes on sim by re-render (cheap), and refresh active report
  renderSim(); renderActiveReport();
}
function resetBase(){initState();renderSim();renderActiveReport();}
function loadStretch(){
  state.lao_dong=B.lao_dong+8;state.ns_hdv=Math.max(B.ns_hdv,B.ns_hdv_hang);state.ns_td=Math.max(B.ns_td,B.ns_td_hang);
  state.td_khbl_pct=B.td_khbl_pct+5;state.hdv_dctc_pct=B.hdv_dctc_pct;
  state.bien_rong=M.bien_rong;state.g_thu_dv=10;state.npl_target=B.npl_ratio;state.thu_xlrr=M.thu_xlrr_2025;
  renderSim();renderActiveReport();
}
function exportCfg(){const blob=new Blob([JSON.stringify({state:state,result:calc()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='branch_plan2026.json';a.click();}

// ============ REPORT HELPERS ============
function planRow(name,plan,actual,opts){
  opts=opts||{};
  const d=actual!==0?(plan/actual-1)*100:0;
  const dcls=Math.abs(d)<0.1?'flat':(d>=0?'up':'down');
  const showPct=opts.pct;
  return '<tr class="'+(opts.total?'total':'')+'"><td>'+name+'</td>'+
    '<td class="planc">'+fmt(plan)+'</td><td>'+fmt(actual)+'</td>'+
    (showPct?'<td>'+(plan/opts.totPlan*100).toFixed(1)+'%</td>':'')+
    '<td><span class="yoy '+dcls+'">'+(d>=0?'+':'')+d.toFixed(1)+'%</span></td></tr>';
}
function liveBar(r){
  return '<div class="livebar"><b>● Đang đồng bộ với Simulator</b> — plan 2026 phản ánh kịch bản hiện tại. '+
    '<span class="pill">Lao động '+r.lao+'</span><span class="pill">NS huy động '+state.ns_hdv.toFixed(1)+'</span><span class="pill">NS tín dụng '+state.ns_td.toFixed(1)+'</span><span class="pill">Tổng LN '+fmt1(r.tong_ln)+' tỷ</span></div>';
}
function dimBars(rows,colorset){
  const mx=Math.max(...rows.map(x=>x[1]));
  return rows.map((x,i)=>{
    const w=x[1]/mx*100;
    return '<div class="brow"><span class="bname">'+x[0]+'</span><span class="bwrap"><span class="bbar" style="width:'+w.toFixed(0)+'%;background:'+colorset[i%colorset.length]+'"></span></span><span class="bval">'+fmt(x[1])+'</span><span class="bp">'+fmt(x[2])+'</span></div>';
  }).join('');
}
const COLORS=['#5a8ad6','#3fb8a0','#c9a227','#d97862','#8b7fd6','#6fae4f','#d6a23e','#5a8ad6'];

// ============ TÍN DỤNG REPORT ============
function renderTindung(){
  const r=calc();
  let h=liveBar(r);
  // KPI
  h+='<div class="kpirow">'+
    '<div class="kpicard"><div class="kl">Tổng dư nợ</div><div class="kv">'+fmt(r.td)+' <span style="font-size:13px;color:var(--txt3)">tỷ</span></div><div class="kp">KH 2026 · <span class="a">TH 2025: '+fmt(B.td)+'</span> <b>'+(r.td/B.td>=1?'+':'')+((r.td/B.td-1)*100).toFixed(1)+'%</b></div></div>'+
    '<div class="kpicard"><div class="kl">Nợ xấu (NPL)</div><div class="kv">'+state.npl_target.toFixed(2)+'%</div><div class="kp">≈ '+fmt1(r.no_xau_plan)+' tỷ · <span class="a">TH 2025: '+(B.npl_ratio).toFixed(2)+'%</span></div></div>'+
    '<div class="kpicard"><div class="kl">Năng suất tín dụng/lao động</div><div class="kv">'+state.ns_td.toFixed(1)+'</div><div class="kp"><span class="a">khu vực '+B.ns_td_kv.toFixed(0)+' · toàn hàng '+B.ns_td_hang.toFixed(0)+'</span></div></div></div>';
  // Phân khúc
  h+='<div class="sec"><div class="sec-h">Cơ cấu theo phân khúc khách hàng</div><div class="sec-sub">Plan 2026 (theo mix slider) vs thực hiện 2025 · → = thực hiện 2025</div>'+
    '<table><thead><tr><th>Phân khúc</th><th class="planh">KH 2026</th><th>TH 2025</th><th>Tỷ trọng</th><th>+/−</th></tr></thead><tbody>'+
    planRow('KHDN (dư cho vay)',r.td_khdn,B.td_seg.KHDN,{pct:true,totPlan:r.td})+
    planRow('KHBL (dư cho vay)',r.td_khbl,B.td_seg.KHBL,{pct:true,totPlan:r.td})+
    planRow('Tài trợ TM, thẻ & khác',r.td_khac,B.td_khac,{pct:true,totPlan:r.td})+
    planRow('Tổng dư nợ',r.td,B.td,{total:true,pct:true,totPlan:r.td})+
    '</tbody></table></div>';
  // Ngành hàng (co giãn cùng KHDN)
  h+='<div class="sec"><div class="sec-h">Phân loại theo ngành hàng</div><div class="sec-sub">Co giãn cùng tổng KHDN plan (giữ tỷ trọng nội bộ 2025)</div><div class="bars">'+
    dimBars(r.td_nganh,COLORS)+'</div></div>';
  // Kỳ hạn + loại tiền
  h+='<div class="sec"><div class="sec-h">Kỳ hạn &amp; loại tiền</div><div class="sec-sub">Giữ cơ cấu 2025, scale theo tổng dư nợ plan</div>'+
    '<table><thead><tr><th>Chỉ tiêu</th><th class="planh">KH 2026</th><th>TH 2025</th><th>+/−</th></tr></thead><tbody>'+
    r.td_kyhan.map(x=>planRow(x[0],x[1],x[2],{})).join('')+
    r.td_loaitien.map(x=>planRow(x[0],x[1],x[2],{})).join('')+
    '</tbody></table></div>';
  document.getElementById('pane-tindung').innerHTML=h;
}

// ============ HUY ĐỘNG REPORT ============

  const r=calc();
  let h=liveBar(r);
  h+='<div class="kpirow">'+
    '<div class="kpicard"><div class="kl">Tổng huy động</div><div class="kv">'+fmt(r.hdv)+' <span style="font-size:13px;color:var(--txt3)">tỷ</span></div><div class="kp">KH 2026 · <span class="a">TH 2025: '+fmt(B.hdv)+'</span> <b>'+(r.hdv/B.hdv>=1?'+':'')+((r.hdv/B.hdv-1)*100).toFixed(1)+'%</b></div></div>'+
    '<div class="kpicard"><div class="kl">Tỷ trọng ĐCTC</div><div class="kv">'+state.hdv_dctc_pct.toFixed(1)+'%</div><div class="kp">≈ '+fmt(r.hdv_dctc)+' tỷ · <span class="a">TH 2025: '+B.hdv_dctc_pct.toFixed(1)+'%</span></div></div>'+
    '<div class="kpicard"><div class="kl">Năng suất huy động/lao động</div><div class="kv">'+state.ns_hdv.toFixed(1)+'</div><div class="kp"><span class="a">khu vực '+B.ns_hdv_kv.toFixed(0)+' · toàn hàng '+B.ns_hdv_hang.toFixed(0)+'</span></div></div></div>';
  h+='<div class="sec"><div class="sec-h">Cơ cấu theo phân khúc khách hàng</div><div class="sec-sub">Plan 2026 (theo mix slider ĐCTC) vs thực hiện 2025</div>'+
    '<table><thead><tr><th>Phân khúc</th><th class="planh">KH 2026</th><th>TH 2025</th><th>Tỷ trọng</th><th>+/−</th></tr></thead><tbody>'+
    planRow('Định chế tài chính',r.hdv_dctc,B.hdv_seg.DCTC,{pct:true,totPlan:r.hdv})+
    planRow('KHDN',r.hdv_khdn,B.hdv_seg.KHDN,{pct:true,totPlan:r.hdv})+
    planRow('KHBL',r.hdv_khbl,B.hdv_seg.KHBL,{pct:true,totPlan:r.hdv})+
    planRow('Tổng huy động',r.hdv,B.hdv,{total:true,pct:true,totPlan:r.hdv})+
    '</tbody></table></div>';
  h+='<div class="sec"><div class="sec-h">Kỳ hạn &amp; loại tiền</div><div class="sec-sub">Giữ cơ cấu 2025, scale theo tổng huy động plan</div>'+
    '<table><thead><tr><th>Chỉ tiêu</th><th class="planh">KH 2026</th><th>TH 2025</th><th>+/−</th></tr></thead><tbody>'+
    r.hdv_kyhan.map(x=>planRow(x[0],x[1],x[2],{})).join('')+
    r.hdv_loaitien.map(x=>planRow(x[0],x[1],x[2],{})).join('')+
    '</tbody></table></div>';
  document.getElementById('pane-huydong').innerHTML=h;
}

// ============ KQKD REPORT ============
function renderKqkd(){
  const r=calc();
  let h=liveBar(r);
  const k=B.kqkd, kb=B.kqkd_bench;
  // P&L table
  h+='<div class="sec"><div class="sec-h">Kết quả kinh doanh chi nhánh</div><div class="sec-sub">Plan 2026 vs thực hiện 2025 · benchmark thật từ báo cáo</div>'+
    '<table><thead><tr><th>Chỉ tiêu (tỷ đồng)</th><th class="planh">KH 2026</th><th>TH 2025</th><th>+/−</th><th>TB khu vực</th><th>TB toàn hàng</th></tr></thead><tbody>'+
    plRowK('Lợi nhuận từ HĐKD',r.ln_hdkd,k.ln_hdkd,kb.ln_hdkd)+
    plRowK('Thu nợ đã XLRR',state.thu_xlrr,k.thu_xlrr,kb.thu_xlrr)+
    plRowK('Tổng lợi nhuận',r.tong_ln,k.tong_ln,kb.tong_ln,true)+
    '</tbody></table>'+
    '<div class="sec-sub" style="margin-top:8px">Ghi chú: thu dịch vụ ('+fmt1(k.thu_dv)+' tỷ TH 2025) đã nằm trong LN từ HĐKD, không cộng kép.</div></div>';
  // Năng suất so benchmark
  h+='<div class="sec"><div class="sec-h">Năng suất lao động · plan vs benchmark</div><div class="sec-sub">Chi nhánh đang vượt hệ thống — dư địa từ tăng lao động hoặc giữ năng suất cao</div>'+
    '<table><thead><tr><th>Chỉ tiêu</th><th class="planh">KH 2026</th><th>TH 2025</th><th>TB khu vực</th><th>TB toàn hàng</th></tr></thead><tbody>'+
    '<tr><td>Năng suất huy động/lao động</td><td class="planc">'+state.ns_hdv.toFixed(1)+'</td><td>'+B.ns_hdv.toFixed(1)+'</td><td>'+B.ns_hdv_kv.toFixed(1)+'</td><td>'+B.ns_hdv_hang.toFixed(1)+'</td></tr>'+
    '<tr><td>Năng suất tín dụng/lao động</td><td class="planc">'+state.ns_td.toFixed(1)+'</td><td>'+B.ns_td.toFixed(1)+'</td><td>'+B.ns_td_kv.toFixed(1)+'</td><td>'+B.ns_td_hang.toFixed(1)+'</td></tr>'+
    '<tr class="total"><td>Số lao động</td><td class="planc">'+state.lao_dong+'</td><td>'+B.lao_dong+'</td><td>—</td><td>—</td></tr>'+
    '</tbody></table></div>';
  document.getElementById('pane-kqkd').innerHTML=h;
}
function plRowK(name,plan,actual,bench,total){
  const d=actual!==0?(plan/actual-1)*100:0;
  const dcls=Math.abs(d)<0.1?'flat':(d>=0?'up':'down');
  return '<tr class="'+(total?'total':'')+'"><td>'+name+'</td><td class="planc">'+fmt1(plan)+'</td><td>'+fmt1(actual)+'</td>'+
    '<td><span class="yoy '+dcls+'">'+(d>=0?'+':'')+d.toFixed(1)+'%</span></td>'+
    '<td>'+fmt1(bench.kv)+'</td><td>'+fmt1(bench.hang)+'</td></tr>';
}

// ============ TAB ROUTER ============
let activeTab='sim';
function showTab(t){
  activeTab=t;
  ['sim','tindung','huydong','kqkd'].forEach(x=>document.getElementById('pane-'+x).style.display=(x===t?'block':'none'));
  document.querySelectorAll('#tabnav .tab-btn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  renderActiveReport();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderActiveReport(){
  if(activeTab==='tindung')renderTindung();
  else if(activeTab==='huydong')renderHuydong();
  else if(activeTab==='kqkd')renderKqkd();
}

document.getElementById('globalfoot').innerHTML='<b>Bottom-up chi nhánh:</b> Huy động = NS huy động × lao động; Tín dụng = NS tín dụng × lao động (mô hình co giãn từ baseline thật). <b>Mix slider</b> điều chỉnh tỷ trọng KHBL (tín dụng) và ĐCTC (huy động); ngành hàng co giãn cùng KHDN. <b>LN HĐKD</b> = quy mô × biên ròng (gộp spread FTP + thu DV − opex). Báo cáo cập nhật realtime theo Simulator · Baseline = báo cáo chi nhánh thực hiện · Đơn vị: tỷ đồng.';

renderSim();
</script>
