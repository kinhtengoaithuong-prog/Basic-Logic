<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Platformer</title>
<style>
    body {
        margin: 0;
        background: #87ceeb;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    canvas {
        display: block;
        margin: auto;
        background: #87ceeb;
        border: 3px solid black;
    }
    #msg {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="msg">Phím mũi tên = Di chuyển | Space = Nhảy</div>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    x: 50, y: 300, w: 30, h: 30,
    vx: 0, vy: 0,
    speed: 4, jump: -11,
    grounded: false
};

const gravity = 0.5;

const platforms = [
    {x: 0,   y: 350, w: 800, h: 50},
    {x: 150, y: 280, w: 120, h: 20},
    {x: 350, y: 220, w: 120, h: 20},
    {x: 550, y: 160, w: 120, h: 20}
];

const goal = { x: 700, y: 120, w: 30, h: 40 };

const keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup",   e => keys[e.code] = false);

let won = false;

function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
    // Di chuyển ngang
    player.vx = 0;
    if (keys["ArrowLeft"])  player.vx = -player.speed;
    if (keys["ArrowRight"]) player.vx =  player.speed;

    // Nhảy
    if (keys["Space"] && player.grounded) {
        player.vy = player.jump;
        player.grounded = false;
    }

    // Trọng lực
    player.vy += gravity;

    // Cập nhật vị trí
    player.x += player.vx;
    player.y += player.vy;

    // Giới hạn hai bên màn hình
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    // Va chạm với bệ đỡ
    player.grounded = false;
    for (const p of platforms) {
        if (rectsOverlap(player, p)) {
            // Chỉ đáp xuống khi đang rơi và ở phía trên bệ
            if (player.vy >= 0 && (player.y + player.h - player.vy) <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            }
        }
    }

    // Rơi khỏi màn hình -> về vị trí ban đầu
    if (player.y > canvas.height) {
        player.x = 50; player.y = 300;
        player.vx = 0; player.vy = 0;
    }

    // Tới đích
    if (rectsOverlap(player, goal)) won = true;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Bệ đỡ
    ctx.fillStyle = "#6b4f2a";
    for (const p of platforms) ctx.fillRect(p.x, p.y, p.w, p.h);

    // Cỏ trên nền chính
    ctx.fillStyle = "#3a8a3a";
    ctx.fillRect(0, 350, 800, 6);

    // Đích (lá cờ)
    ctx.fillStyle = "#d62828";
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
    ctx.fillStyle = "#000";
    ctx.fillRect(goal.x, goal.y, 4, goal.h + 40);

    // Người chơi
    ctx.fillStyle = "#1d3557";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    if (won) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 48px Arial";
        ctx.textAlign = "center";
        ctx.fillText("CHIẾN THẮNG! 🎉", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px Arial";
        ctx.fillText("Nhấn F5 để chơi lại", canvas.width / 2, canvas.height / 2 + 40);
    }
}

function loop() {
    if (!won) update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
